            schema:
              type: object
              required: [tenant_id, scenario_id]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                scenario_id: {type: string, format: uuid}
      responses:
        '200': {description: Cancelled simulation scenario}
