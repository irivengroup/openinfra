                tenant_id: {type: string}
                actor: {type: string}
                vrf: {type: string}
                cidr: {type: string, example: 10.25.1.0/24}
                description: {type: string}
      responses:
        '201': {description: Prefix persisted or returned idempotently}
        '400': {description: Validation error}
        '409': {description: Prefix overlaps an existing prefix in the same VRF}
  /api/v1/ipam/ranges:
    post:
      summary: Define an allocation, reservation or exclusion range inside a prefix
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, vrf, prefix, start, end]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                vrf: {type: string}
                prefix: {type: string, example: 10.25.1.0/24}
                start: {type: string, example: 10.25.1.10}
                end: {type: string, example: 10.25.1.50}
                purpose: {type: string, enum: [allocation, reservation, exclusion]}
                description: {type: string}
      responses:
        '201': {description: Range persisted}
        '400': {description: Validation error}
        '409': {description: Range overlaps an existing range in the same VRF and prefix}
  /api/v1/ipam/addresses:
    post:
      summary: Register an IP address and optional interface binding inside a prefix
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, vrf, prefix, address]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                vrf: {type: string}
                prefix: {type: string, example: 10.25.1.0/24}
                address: {type: string, example: 10.25.1.10}
                hostname: {type: string}
                interface_name: {type: string}
                status: {type: string, enum: [planned, reserved, active, deprecated]}
      responses:
        '201': {description: Address record upserted}
        '400': {description: Validation error}
  /api/v1/ipam/capacity:
    get:
      summary: Report usable, reserved and free address capacity for one prefix
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: vrf, in: query, required: true, schema: {type: string}}
        - {name: prefix, in: query, required: true, schema: {type: string}}
      responses:
        '200': {description: Prefix capacity report}
        '400': {description: Validation error}
  /api/v1/ipam/vlan-groups:
    post:
      summary: Define a tenant-scoped VLAN group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                name: {type: string}
                scope: {type: string}
                description: {type: string}
      responses:
        '201': {description: VLAN group persisted}
        '400': {description: Validation error}
  /api/v1/ipam/vxlan-vnis:
    post:
      summary: Define a tenant-scoped VNI attached to one VRF
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, vni, name, vrf]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                vni: {type: integer, minimum: 1, maximum: 16777215}
                name: {type: string}
                vrf: {type: string}
                route_targets_import:
                  type: array
                  items: {type: string}
                route_targets_export:
                  type: array
                  items: {type: string}
                description: {type: string}
      responses:
        '201': {description: VNI persisted}
        '400': {description: Validation error}
        '409': {description: VNI already attached to another VRF}
  /api/v1/ipam/vlans:
    post:
      summary: Define a VLAN and optional VRF/VNI attachment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, group, vlan_id, name]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                group: {type: string}
                vlan_id: {type: integer, minimum: 1, maximum: 4094}
                name: {type: string}
                vrf: {type: string}
                vni: {type: integer, minimum: 1, maximum: 16777215}
                description: {type: string}
      responses:
        '201': {description: VLAN persisted}
        '400': {description: Validation error}
        '404': {description: Referenced VNI is not defined}
        '409': {description: VLAN/VNI/VRF relation is incoherent}
  /api/v1/ipam/asns:
    post:
      summary: Define an autonomous system number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, asn, name]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                asn: {type: integer, minimum: 1, maximum: 4294967295}
                name: {type: string}
                description: {type: string}
      responses:
        '201': {description: ASN persisted}
        '400': {description: Validation error}
  /api/v1/ipam/bgp-peers:
    post:
      summary: Define a BGP peer inside a VRF
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, vrf, local_asn, remote_asn, peer_address]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                vrf: {type: string}
                local_asn: {type: integer, minimum: 1, maximum: 4294967295}
                remote_asn: {type: integer, minimum: 1, maximum: 4294967295}
                peer_address: {type: string}
                address_family: {type: string, enum: [ipv4, ipv6]}
                route_targets_import:
                  type: array
                  items: {type: string}
                route_targets_export:
                  type: array
                  items: {type: string}
                description: {type: string}
      responses:
        '201': {description: BGP peer persisted}
        '400': {description: Validation error}
        '404': {description: Local or remote ASN is not defined}
  /api/v1/ipam/network-bindings:
    get:
      summary: Report VRF/VLAN/VNI/ASN/BGP bindings for one tenant
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: vrf, in: query, required: false, schema: {type: string}}
      responses:
        '200': {description: Network binding inventory}
        '400': {description: Validation error}
  /api/v1/ipam/topology:
    get:
      summary: Build an operational IPAM topology graph for one tenant or VRF
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: vrf, in: query, required: false, schema: {type: string}}
      responses:
        '200': {description: IPAM topology graph with nodes, edges, summary and integrity}
        '400': {description: Validation error}
  /api/v1/ipam/dns-observations:
    post:
      summary: Record an observed DNS/PTR fact for IPAM conflict detection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, vrf, hostname, address]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                vrf: {type: string}
                hostname: {type: string}
                address: {type: string}
                ptr_hostname: {type: string}
                source: {type: string}
      responses:
        '201': {description: DNS observation persisted}
        '400': {description: Validation error}
  /api/v1/ipam/dhcp-leases:
    post:
      summary: Record an observed DHCP lease for IPAM conflict detection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, vrf, prefix, address, mac_address, hostname]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                vrf: {type: string}
                prefix: {type: string}
                address: {type: string}
                mac_address: {type: string}
                hostname: {type: string}
                source: {type: string}
                active: {type: boolean}
      responses:
        '201': {description: DHCP lease observation persisted}
        '400': {description: Validation error}
  /api/v1/ipam/conflicts:
    get:
      summary: Detect IPAM conflicts and observed DNS/DHCP divergences
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: vrf, in: query, required: false, schema: {type: string}}
      responses:
        '200': {description: Conflict report}
        '400': {description: Validation error}
  /api/v1/ipam/ui-dashboard:
    get:
      summary: Render the operational IPAM dashboard view model
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: vrf, in: query, required: false, schema: {type: string}}
      responses:
        '200': {description: IPAM UI dashboard view model}
        '400': {description: Validation error}
  /api/v1/ipam/ui-search:
    get:
      summary: Search IPAM UI objects across prefixes, reservations, DNS and DHCP observations
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: query, in: query, required: true, schema: {type: string}}
        - {name: vrf, in: query, required: false, schema: {type: string}}
      responses:
        '200': {description: Search results}
        '400': {description: Validation error}

  /api/v1/ipam/ddi-preview:
    post:
      summary: Preview DNS/DHCP DDI changes for an existing IPAM reservation
      description: Produces deterministic BIND, PowerDNS and Kea baseline changes, detected divergences and compensating rollback changes. No external DDI system is contacted by this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, vrf, idempotency_key]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                vrf: {type: string}
                idempotency_key: {type: string}
                providers:
                  type: array
                  items: {type: string, enum: [all, bind, powerdns, kea]}
                dns_zone: {type: string, example: example.net}
                mac_address: {type: string, example: aa:bb:cc:00:00:01}
                ttl: {type: integer, minimum: 0, maximum: 86400, default: 300}
                apply_preview: {type: boolean, default: false}
      responses:
        '200': {description: DDI dry-run plan with changes, divergences and rollback changes}
        '400': {description: Validation error or missing reservation}
  /api/v1/exports/jobs:
    post:
      summary: Queue an asynchronous signed export job
      description: Creates a non-blocking export job for RSOT (Ressource Source of Truth) data. The job remains queued until an export worker invokes the run endpoint or CLI command.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, admin_token]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                admin_token: {type: string}
                resource: {type: string, enum: [source_objects], default: source_objects}
                format: {type: string, enum: [csv, json, xlsx], default: json}
                kind: {type: string}
                tag: {type: string}
                limit: {type: integer, minimum: 1, maximum: 1000000, default: 100000}
      responses:
        '202': {description: Export job queued}
        '400': {description: Validation error or access error}
    get:
      summary: Read an export job status and signed artifact metadata
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: job_id, in: query, required: true, schema: {type: string}}
        - {name: admin_token, in: query, required: false, schema: {type: string}}
      responses:
        '200': {description: Export job report}
        '400': {description: Validation error or unknown export job}
  /api/v1/exports/run:
    post:
      summary: Run one queued export job and produce a signed artifact
      description: Executes a queued export in a bounded paginated worker step, stores the artifact, computes SHA-256 and signs the content with HMAC-SHA256.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, admin_token]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api-worker}
                admin_token: {type: string}
                job_id: {type: string}
                page_size: {type: integer, minimum: 1, maximum: 500, default: 500}
      responses:
        '200': {description: Completed or failed export job report}
        '400': {description: Validation error or no runnable queued job}
  /api/v1/exports/artifact:
    get:
      summary: Download a signed export artifact after digest and signature verification
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: job_id, in: query, required: true, schema: {type: string}}
        - {name: admin_token, in: query, required: false, schema: {type: string}}
      responses:
        '200': {description: Binary export artifact}
        '400': {description: Validation error, unavailable artifact or integrity failure}
  /api/v1/exports/artifact-chunk:
    get:
      summary: Read one verified byte chunk from a signed export artifact
      description: Verifies artifact SHA-256 and HMAC signature before returning a bounded base64 chunk with next_offset for streaming download clients.
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: job_id, in: query, required: true, schema: {type: string}}
        - {name: offset, in: query, required: false, schema: {type: integer, minimum: 0, default: 0}}
        - {name: size, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 1048576, default: 65536}}
        - {name: admin_token, in: query, required: false, schema: {type: string}}
      responses:
        '200': {description: JSON chunk containing base64 content, chunk digest and next offset}
        '400': {description: Validation error, unavailable artifact or integrity failure}

  /api/v1/imports/datasets:
    post:
      summary: Validate or apply a mapped CSV, JSON or XLSX dataset into RSOT (Ressource Source of Truth)
      description: "Performs a dry-run by default. When apply is true, the import is atomic: any invalid row prevents all RSOT (Ressource Source of Truth) mutations and produces a DLQ report."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, admin_token, file_path, format, mapping]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                admin_token: {type: string}
                file_path: {type: string}
                format: {type: string, enum: [csv, json, xlsx]}
                apply: {type: boolean, default: false}
                batch_size: {type: integer, minimum: 1, default: 500}
                mapping:
                  type: object
                  additionalProperties: {type: string}
                  example:
                    key: asset_key
                    kind: kind
                    display_name: name
                    source: source
                    attributes.serial: serial
      responses:
        '200': {description: Dry-run import report with impacts and DLQ}
        '201': {description: Applied import report}
        '400': {description: Validation error, access error or invalid dataset}
  /api/v1/imports/report:
    get:
      summary: Read a persisted import report
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: job_id, in: query, required: true, schema: {type: string}}
      responses:
        '200': {description: Persisted import report}
        '400': {description: Validation error or unknown report}

  /api/v1/imports/bulk-datasets:
    post:
      summary: Stream and validate or apply a massive mapped dataset with checkpoints
      description: "Bulk import processes rows in bounded batches, persists checkpoints, records metrics and keeps a DLQ sample. Valid rows may be applied batch by batch while invalid rows are reported."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, admin_token, file_path, format, mapping]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                admin_token: {type: string}
                file_path: {type: string}
                format: {type: string, enum: [csv, json, xlsx]}
                apply: {type: boolean, default: false}
                batch_size: {type: integer, minimum: 1, maximum: 100000, default: 5000}
                checkpoint_interval: {type: integer, minimum: 1, maximum: 1000000, default: 25000}
                resume_job_id: {type: string}
                sample_limit: {type: integer, minimum: 0, maximum: 10000, default: 100}
                mapping:
                  type: object
                  additionalProperties: {type: string}
                  example:
                    key: asset_key
                    kind: kind
                    display_name: name
                    source: source
                    attributes.serial: serial
      responses:
        '200': {description: Bulk dry-run report with metrics and latest checkpoint}
        '201': {description: Bulk apply report with metrics and latest checkpoint}
        '400': {description: Validation error, access error or invalid dataset}
  /api/v1/imports/bulk-report:
    get:
      summary: Read a persisted bulk import report
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: job_id, in: query, required: true, schema: {type: string}}
      responses:
        '200': {description: Persisted bulk import report}
        '400': {description: Validation error or unknown bulk report}
  /api/v1/imports/bulk-checkpoint:
    get:
      summary: Read the latest checkpoint for a bulk import job
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: job_id, in: query, required: true, schema: {type: string}}
      responses:
        '200': {description: Persisted bulk import checkpoint}
        '400': {description: Validation error or unknown bulk checkpoint}



  /api/v1/imports/bulk-rollback:
    post:
      summary: Plan or apply a safe rollback for an applied bulk import job
      description: "Replays the processed dataset up to the persisted checkpoint, detects conflicts, restores previous RSOT versions for updated objects and retires objects created by the bulk import without physical deletion."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, admin_token, job_id, file_path, format, mapping]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                admin_token: {type: string}
                job_id: {type: string}
                file_path: {type: string}
                format: {type: string, enum: [csv, json, xlsx]}
                apply: {type: boolean, default: false}
                conflict_policy: {type: string, enum: [fail, skip], default: fail}
                mapping:
                  type: object
                  additionalProperties: {type: string}
                  example:
                    key: asset_key
                    kind: kind
                    display_name: name
                    source: source
                    attributes.serial: serial
      responses:
        '200': {description: Dry-run rollback plan with conflict information}
        '201': {description: Applied rollback report}
        '400': {description: Validation error, access error, unknown job or rollback conflict}

  /api/v1/imports/bulk-progress:
    get:
      summary: Read resumability and processed-row counters for a bulk import job
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: job_id, in: query, required: true, schema: {type: string}}
      responses:
        '200': {description: Bulk import progress state with checkpoint counters}
        '400': {description: Validation error or unknown bulk import job}


  /api/v1/discovery/collectors:
    get:
      summary: List discovery collectors
      security: [{bearerToken: []}]
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 500, default: 100}}
        - {name: cursor, in: query, required: false, schema: {type: string}}
        - {name: include_inactive, in: query, required: false, schema: {type: boolean, default: false}}
      responses:
        '200': {description: Registered collectors page}
        '401': {description: Security administrator token required}
        '400': {description: Validation error}
    post:
      summary: Register a strongly identified discovery collector
      security: [{bearerToken: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name, kind, certificate_fingerprint, scopes, version]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                name: {type: string}
                kind: {type: string, enum: [snmp, ssh, winrm, vmware, proxmox, hyperv, kubernetes, cloud, site-proxy, network-proxy, datacenter-proxy, generic]}
                certificate_fingerprint: {type: string, pattern: '^[a-fA-F0-9:]{64,95}$'}
                scopes: {type: array, minItems: 1, items: {type: string}}
                version: {type: string}
                vault_secret_ref: {type: string, nullable: true}
                endpoint_url: {type: string, nullable: true}
      responses:
        '201': {description: Collector registered}
        '401': {description: Security administrator token required}
        '400': {description: Validation error}
  /api/v1/discovery/protocol-profiles:
    get:
      summary: List secured SNMP/SSH/WinRM discovery protocol profiles
      security: [{bearerToken: []}]
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 500, default: 100}}
        - {name: cursor, in: query, required: false, schema: {type: string}}
        - {name: include_inactive, in: query, required: false, schema: {type: boolean, default: false}}
      responses:
        '200': {description: Protocol profile page with masked vault references}
        '401': {description: Security administrator token required}
        '400': {description: Validation error}
  /api/v1/discovery/protocol-profile:
    get:
      summary: Read a secured discovery protocol profile
      security: [{bearerToken: []}]
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: profile_id, in: query, required: true, schema: {type: string}}
      responses:
        '200': {description: Protocol profile with masked vault reference}
        '401': {description: Security administrator token required}
        '400': {description: Validation error}
  /api/v1/discovery/protocol-profile/create:
    post:
      summary: Create a secured SNMP/SSH/WinRM discovery protocol profile
      description: Stores only vault:// credential references, bounded concurrency and rate-limit settings; no secret material is returned.
      security: [{bearerToken: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name, protocol, scope, credential_secret_ref]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                name: {type: string}
                protocol: {type: string, enum: [snmp, ssh, winrm]}
                scope: {type: string}
                credential_secret_ref: {type: string, pattern: '^vault://'}
                port: {type: integer, minimum: 1, maximum: 65535, nullable: true}
                timeout_seconds: {type: integer, minimum: 1, maximum: 300, default: 30}
                max_concurrency: {type: integer, minimum: 1, maximum: 64, default: 4}
                rate_limit_per_minute: {type: integer, minimum: 1, maximum: 10000, default: 120}
                retry_count: {type: integer, minimum: 0, maximum: 5, default: 1}
      responses:
        '201': {description: Created protocol profile with masked vault reference}
        '401': {description: Security administrator token required}
        '400': {description: Validation error}
  /api/v1/discovery/protocol-profile/update:
    post:
      summary: Update a secured discovery protocol profile
      security: [{bearerToken: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, profile_id]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                profile_id: {type: string}
                name: {type: string}
                scope: {type: string}
                credential_secret_ref: {type: string, pattern: '^vault://'}
                port: {type: integer, minimum: 1, maximum: 65535}
                timeout_seconds: {type: integer, minimum: 1, maximum: 300}
                max_concurrency: {type: integer, minimum: 1, maximum: 64}
                rate_limit_per_minute: {type: integer, minimum: 1, maximum: 10000}
                retry_count: {type: integer, minimum: 0, maximum: 5}
      responses:
        '200': {description: Updated protocol profile with masked vault reference}
        '401': {description: Security administrator token required}
        '400': {description: Validation error}
  /api/v1/discovery/protocol-profile/delete:
    post:
      summary: Disable a secured discovery protocol profile
      security: [{bearerToken: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, profile_id, reason]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                profile_id: {type: string}
