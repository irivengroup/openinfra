        '400': {description: Invalid content, permissions or metadata}
        '401': {description: Missing or invalid RAG writer token}
  /api/v1/rag/documents/deactivate:
    post:
      operationId: deactivateRagDocument
      summary: Deactivate one governed document without deleting its history
      security: [{bearerToken: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, document_id]
              properties:
                tenant_id: {type: string}
                document_id: {type: string, format: uuid}
                actor: {type: string, default: api}
      responses:
        '200': {description: Deactivated document}
        '400': {description: Unknown or invalid document}
        '401': {description: Missing or invalid RAG writer token}
  /api/v1/rag/index/rsot:
    post:
      operationId: synchronizeRagFromRsot
      summary: Synchronize permission-labelled documents from the RSOT without mutating it
      security: [{bearerToken: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                max_objects: {type: integer, minimum: 1, maximum: 10000, default: 5000}
                deactivate_missing: {type: boolean, default: false}
      responses:
        '200': {description: RSOT synchronization result}
        '400': {description: Invalid synchronization request}
        '401': {description: Missing RAG import or RSOT read permission}
  /api/v1/rag/query:
    post:
      operationId: queryGovernedRag
      summary: Produce an extractive answer with mandatory citations from permitted sources
      description: Sources are filtered by tenant and permissions before retrieval. This endpoint cannot execute infrastructure actions.
      security: [{bearerToken: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, question]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                question: {type: string, minLength: 2, maxLength: 4096}
                limit: {type: integer, minimum: 1, maximum: 10, default: 6}
      responses:
        '201': {description: Audited answer with citations or explicit insufficient-context status}
        '400': {description: Invalid or unsearchable question}
        '401': {description: Missing or invalid RAG query token}
  /api/v1/rag/answers:
    get:
      operationId: listRagAnswers
      summary: List audited RAG answers for the tenant
      security: [{bearerToken: []}]
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 500, default: 100}}
        - {name: cursor, in: query, schema: {type: string}}
      responses:
        '200': {description: Paginated answers}
        '400': {description: Invalid cursor}
        '401': {description: Missing or invalid RAG reader token}
  /api/v1/rag/answers/get:
    get:
      operationId: getRagAnswer
      summary: Get one cited answer
      security: [{bearerToken: []}]
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: answer_id, in: query, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Cited answer}
        '400': {description: Unknown or invalid answer}
        '401': {description: Missing or invalid RAG reader token}
  /api/v1/rag/jobs:
    get:
      operationId: listRagJobs
      summary: List resumable RAG import and export jobs
      security: [{bearerToken: []}]
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 500, default: 100}}
        - {name: cursor, in: query, schema: {type: string}}
      responses:
        '200': {description: Paginated jobs}
        '400': {description: Invalid cursor}
        '401': {description: Missing or invalid RAG reader token}
  /api/v1/rag/jobs/get:
    get:
      operationId: getRagJob
      summary: Get one resumable RAG job
      security: [{bearerToken: []}]
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: job_id, in: query, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: RAG job}
        '400': {description: Unknown or invalid job}
        '401': {description: Missing or invalid RAG reader token}
  /api/v1/rag/jobs/create:
    post:
      operationId: createRagJob
      summary: Create an idempotent batched document-import or answer-export job
      security: [{bearerToken: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, kind, idempotency_key, payload]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                kind: {type: string, enum: [document-import, answer-export]}
                idempotency_key: {type: string, minLength: 3, maxLength: 255}
                payload: {type: object}
                batch_size: {type: integer, minimum: 1, maximum: 1000, default: 100}
      responses:
        '201': {description: Created or idempotently resolved job}
        '400': {description: Invalid job payload}
        '401': {description: Missing RAG import or export permission}
  /api/v1/rag/jobs/run:
    post:
      operationId: runRagJobBatch
      summary: Execute the next deterministic batch of a resumable RAG job
      security: [{bearerToken: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, job_id]
              properties:
                tenant_id: {type: string}
                job_id: {type: string, format: uuid}
                actor: {type: string, default: api}
      responses:
        '200': {description: Updated job progress}
        '400': {description: Unknown, invalid or failed job}
        '401': {description: Missing RAG import or export permission}
  /api/v1/rag/jobs/artifact:
    get:
      operationId: downloadRagJobArtifact
      summary: Download the completed answer-export artifact
      security: [{bearerToken: []}]
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: job_id, in: query, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: Downloadable JSON or CSV artifact
          content:
            application/json: {schema: {type: object}}
            text/csv: {schema: {type: string}}
        '400': {description: Artifact unavailable or invalid job}
        '401': {description: Missing or invalid RAG export token}
  /api/v1/sbom/documents:
    get:
      operationId: listSbomDocuments
      summary: List versioned CycloneDX or SPDX documents
      security: [{bearerToken: []}]
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: application, in: query, schema: {type: string}}
        - {name: environment, in: query, schema: {type: string}}
        - {name: format, in: query, schema: {type: string, enum: [cyclonedx, spdx]}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 500, default: 100}}
        - {name: cursor, in: query, schema: {type: string}}
      responses:
        '200': {description: Paginated SBOM documents}
        '400': {description: Invalid filter or cursor}
        '401': {description: Missing or invalid SBOM reader token}
  /api/v1/sbom/documents/get:
    get:
      operationId: getSbomDocument
      summary: Get a versioned SBOM and its normalized components
      security: [{bearerToken: []}]
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: document_id, in: query, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: SBOM document}
        '400': {description: Unknown or invalid document}
        '401': {description: Missing or invalid SBOM reader token}
  /api/v1/sbom/documents/import:
    post:
      operationId: importSbomDocument
      summary: Import a CycloneDX or SPDX JSON document without active scanning
      security: [{bearerToken: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, application, release, environment, source_name, sbom]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                application: {type: string, maxLength: 128}
                release: {type: string, maxLength: 128}
                environment: {type: string, maxLength: 64}
                source_name: {type: string, maxLength: 255}
                source_uri: {type: string, format: uri, maxLength: 2048}
                sbom: {type: object, description: CycloneDX or SPDX JSON object}
      responses:
        '201': {description: Imported or idempotently resolved SBOM document}
        '400': {description: Unsupported, malformed or oversized SBOM}
        '401': {description: Missing or invalid SBOM importer token}
  /api/v1/sbom/vulnerabilities:
    get:
      operationId: listSbomVulnerabilities
      summary: List externally imported vulnerability records
      security: [{bearerToken: []}]
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: cve_id, in: query, schema: {type: string, pattern: '^CVE-[0-9]{4}-[0-9]{4,19}$'}}
        - {name: component, in: query, schema: {type: string}}
        - {name: known_exploited, in: query, schema: {type: boolean}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 500, default: 100}}
        - {name: cursor, in: query, schema: {type: string}}
      responses:
        '200': {description: Paginated vulnerability records}
        '400': {description: Invalid filter or cursor}
        '401': {description: Missing or invalid SBOM reader token}
  /api/v1/sbom/vulnerabilities/import:
    post:
      operationId: importSbomVulnerability
      summary: Import a vulnerability finding from an external scanner or advisory source
      security: [{bearerToken: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, cve_id, component_name, component_version, cvss_score]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                cve_id: {type: string, pattern: '^CVE-[0-9]{4}-[0-9]{4,19}$'}
                component_name: {type: string, maxLength: 255}
                component_version: {type: string, maxLength: 255}
                component_purl: {type: string, maxLength: 1024}
                cvss_score: {type: number, minimum: 0, maximum: 10}
                known_exploited: {type: boolean, default: false}
                exploit_maturity: {type: string, maxLength: 64, default: unknown}
                source_name: {type: string, maxLength: 255, default: external-scanner}
                published_at: {type: string, format: date-time}
                modified_at: {type: string, format: date-time}
                references: {type: array, maxItems: 100, items: {type: string, format: uri}}
                metadata: {type: object}
      responses:
        '201': {description: Imported or idempotently resolved vulnerability}
        '400': {description: Invalid CVE, PURL, score, dates or metadata}
        '401': {description: Missing or invalid SBOM importer token}
  /api/v1/sbom/exposures:
    get:
      operationId: listSbomExposureContexts
      summary: List application exposure and business criticality contexts
      security: [{bearerToken: []}]
      parameters:
