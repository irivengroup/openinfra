                tenant_id: {type: string}
                collector_id: {type: string}
                certificate_fingerprint: {type: string}
                requested_scope: {type: string}
                job_type: {type: string}
                target: {type: string}
      responses:
        '200': {description: Job authorized}
        '403': {description: Collector not authorized for this job}
        '400': {description: Validation error}
