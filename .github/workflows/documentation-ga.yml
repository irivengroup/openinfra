name: OpenInfra GA Documentation

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  documentation:
    name: Validate GA documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'
          cache: pip

      - name: Install runtime and validation dependencies
        run: |
          python -m pip install --upgrade "pip>=26.0"
          python -m pip install -e '.[postgresql]'
          python -m pip install --requirement requirements/dev.txt

      - name: Validate GA documentation
        run: |
          mkdir -p build/reports
          python scripts/validate_ga_documentation.py \
            --project-root . \
            --output build/reports/ga-documentation-report.json \
            --enforce

      - name: Upload documentation evidence
        uses: actions/upload-artifact@v6
        with:
          name: ga-documentation-report
          path: build/reports/ga-documentation-report.json
          if-no-files-found: error
          retention-days: 90
