openapi: 3.1.0
info:
  title: OpenInfra API Foundation
  version: 0.17.2
components:
  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: OpenInfra API token
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: API is alive
  /ready:
    get:
      summary: Runtime readiness probe validating persistence and PostgreSQL schema state
      responses:
        '200':
          description: Backend is reachable and schema is ready
        '503':
          description: Backend or schema is not ready
  /api/v1/version:
    get:
      summary: Version
      responses:
        '200':
          description: Version payload
  /api/v1/database/schema:
    get:
      summary: PostgreSQL schema migration status
      responses:
        '200':
          description: Schema is up to date or JSON backend does not require migrations
        '409':
          description: PostgreSQL schema has pending migrations or checksum drift
  /api/v1/security/whoami:
    post:
      summary: Validate an API token and return the authenticated principal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, token]
              properties:
                tenant_id:
                  type: string
                token:
                  type: string
      responses:
        '200':
          description: Authenticated principal
        '400':
          description: Validation error
        '401':
          description: Invalid token

  /api/v1/security/tokens:
    get:
      summary: List API token metadata without returning token hashes or secrets
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated token metadata
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/security/revoke-token:
    post:
      summary: Revoke an API token using a security administrator token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, target_token]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                target_token:
                  type: string
                admin_token:
                  type: string
      responses:
        '200':
          description: Revocation result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/security/rotate-token:
    post:
      summary: Rotate a security administrator token and revoke the previous token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, current_token]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                current_token:
                  type: string
                subject:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
                token:
                  type: string
                ttl_seconds:
                  type: integer
                  minimum: 60
      responses:
        '201':
          description: Replacement token created
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/users:
    post:
      summary: Create or update an IAM user
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, username, display_name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                username:
                  type: string
                display_name:
                  type: string
                email:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: IAM user persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/groups:
    post:
      summary: Create or update an IAM group
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name, display_name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                name:
                  type: string
                display_name:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: IAM group persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/group-memberships:
    post:
      summary: Add a user to an IAM group
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, username, group_name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                username:
                  type: string
                group_name:
                  type: string
      responses:
        '201':
          description: IAM group membership persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/user-roles:
    post:
      summary: Grant a built-in role directly to a user
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, username, role]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                username:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: User role grant result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/group-roles:
    post:
      summary: Grant a built-in role to a group
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, group_name, role]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                group_name:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: Group role grant result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/effective:
    get:
      summary: Return effective roles for an IAM subject
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: subject
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Effective identity roles
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/access/rules:
    get:
      summary: List ABAC access policy rules
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated ABAC rules
        '400':
          description: Validation error
        '401':
          description: Missing or invalid access policy administrator token
    post:
      summary: Create or update an ABAC access policy rule
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name, permission, effect]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                name:
                  type: string
                permission:
                  type: string
                effect:
                  type: string
                  enum: [allow, deny]
                subjects:
                  type: array
                  items:
                    type: string
                roles:
                  type: array
                  items:
                    type: string
                site_codes:
                  type: array
                  items:
                    type: string
                environments:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: ABAC rule persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid access policy administrator token
  /api/v1/access/evaluate:
    post:
      summary: Evaluate a Bearer token against a contextual ABAC request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, token, permission]
              properties:
                tenant_id:
                  type: string
                token:
                  type: string
                permission:
                  type: string
                site_code:
                  type: string
                environment:
                  type: string
      responses:
        '200':
          description: ABAC evaluation result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
  /api/v1/access/deactivate-rule:
    post:
      summary: Deactivate an ABAC access policy rule
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: Deactivation result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid access policy administrator token
  /api/v1/audit/events:
    get:
      summary: List audit events with pagination, filters and integrity hashes
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: actor
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: target_type
          in: query
          required: false
          schema:
            type: string
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [info, warning, error, critical]
      responses:
        '200':
          description: Paginated audit event records
        '400':
          description: Validation error
        '401':
          description: Missing or invalid audit reader token
  /api/v1/audit/export:
    post:
      summary: Export audit events as JSON or JSONL
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id]
              properties:
                tenant_id:
                  type: string
                format:
                  type: string
                  enum: [json, jsonl]
                limit:
                  type: integer
                  minimum: 1
                  maximum: 500
                cursor:
                  type: string
                actor:
                  type: string
                action:
                  type: string
                target_type:
                  type: string
                severity:
                  type: string
                  enum: [info, warning, error, critical]
      responses:
        '200':
          description: Audit export bundle
        '400':
          description: Validation error
        '401':
          description: Missing or invalid audit reader token
  /api/v1/audit/integrity:
    get:
      summary: Verify the tenant audit trail hash chain
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10000
      responses:
        '200':
          description: Audit integrity report
        '400':
          description: Validation error
        '401':
          description: Missing or invalid audit reader token

  /api/v1/dcim/rooms:
    post:
      summary: Define a physical DCIM room hierarchy with floor, grid, optional zone and coordinates
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, site_code, site_name, country, city, building_code, building_name, floor_code, floor_name, floor_index, room_code, room_name, rows, columns]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                site_code: {type: string}
                site_name: {type: string}
                country: {type: string}
                region: {type: string}
                city: {type: string}
                building_code: {type: string}
                building_name: {type: string}
                floor_code: {type: string}
                floor_name: {type: string}
                floor_index: {type: integer}
                room_code: {type: string}
                room_name: {type: string}
                rows:
                  type: array
                  items: {type: string}
                columns:
                  type: array
                  items: {type: string}
                zone_code: {type: string}
                zone_name: {type: string}
                zone_rows:
                  type: array
                  items: {type: string}
                zone_columns:
                  type: array
                  items: {type: string}
                x: {type: number}
                y: {type: number}
                z: {type: number}
      responses:
        '201': {description: Physical room hierarchy persisted}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM operator token}
  /api/v1/dcim/racks:
    post:
      summary: Define a rack with U capacity, usable faces and physical placement
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, site, building, room, rack, row, column, units]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                site: {type: string}
                building: {type: string}
                floor: {type: string}
                room: {type: string}
                zone: {type: string}
                rack: {type: string}
                row: {type: string}
                column: {type: string}
                units:
                  type: integer
                  minimum: 1
                  maximum: 60
                faces:
                  type: array
                  items:
                    type: string
                    enum: [front, rear]
                max_weight_kg: {type: number}
                power_capacity_watts: {type: integer}
                x: {type: number}
                y: {type: number}
                z: {type: number}
      responses:
        '201': {description: Rack capacity definition persisted}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM operator token}
  /api/v1/dcim/rack-capacity:
    get:
      summary: Return rack U occupation by face
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: site
          in: query
          required: true
          schema: {type: string}
        - name: building
          in: query
          required: true
          schema: {type: string}
        - name: room
          in: query
          required: true
          schema: {type: string}
        - name: rack
          in: query
          required: true
          schema: {type: string}
      responses:
        '200': {description: Rack capacity report}
        '400': {description: Validation error}

  /api/v1/dcim/locator-sheet:
    get:
      summary: Generate a field locator sheet with compact QR payload and human intervention path
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: asset_tag
          in: query
          required: true
          schema: {type: string}
        - name: format
          in: query
          required: false
          schema: {type: string, enum: [json, html]}
      responses:
        '200': {description: Locator sheet in JSON or HTML wrapper}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM identification token}
  /api/v1/dcim/room-plan:
    get:
      summary: Render a deterministic 2D room plan with rows, columns, racks and floor equipment
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: site
          in: query
          required: true
          schema: {type: string}
        - name: building
          in: query
          required: true
          schema: {type: string}
        - name: room
          in: query
          required: true
          schema: {type: string}
        - name: format
          in: query
          required: false
          schema: {type: string, enum: [json, svg, html]}
      responses:
        '200': {description: Room plan in JSON or SVG/HTML wrapper}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM locator token}
        '404': {description: Room not found}
  /api/v1/dcim/rack-elevation:
    get:
      summary: Render a rack elevation for a selected face with U occupancy and free units
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: site
          in: query
          required: true
          schema: {type: string}
        - name: building
          in: query
          required: true
          schema: {type: string}
        - name: room
          in: query
          required: true
          schema: {type: string}
        - name: rack
          in: query
          required: true
          schema: {type: string}
        - name: face
          in: query
          required: false
          schema: {type: string, enum: [front, rear]}
        - name: format
          in: query
          required: false
          schema: {type: string, enum: [json, svg, html]}
      responses:
        '200': {description: Rack elevation in JSON or SVG/HTML wrapper}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM locator token}
        '404': {description: Rack not found}
  /api/v1/dcim/patch-panels:
    post:
      summary: Define a rack-mounted patch panel and generate DCIM ports
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, site, building, room, rack, patch_panel, u_position, port_count, connector, medium]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                site: {type: string}
                building: {type: string}
                room: {type: string}
                rack: {type: string}
                patch_panel: {type: string}
                rack_face: {type: string, enum: [front, rear]}
                u_position: {type: integer, minimum: 1, maximum: 60}
                u_height: {type: integer, minimum: 1, maximum: 10}
                port_count: {type: integer, minimum: 1, maximum: 288}
                connector: {type: string, enum: [rj45, lc, sc, mpo, sfp, qsfp]}
                medium: {type: string, enum: [copper, fiber, dac]}
                label: {type: string}
                port_prefix: {type: string}
      responses:
        '201': {description: Patch panel and generated ports persisted}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM operator token}
  /api/v1/dcim/ports:
    post:
      summary: Define a DCIM port on equipment or patch panel
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, owner_type, owner_code, port_name, connector, medium]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                owner_type: {type: string, enum: [equipment, patch_panel]}
                owner_code: {type: string}
                port_name: {type: string}
                connector: {type: string, enum: [rj45, lc, sc, mpo, sfp, qsfp]}
                medium: {type: string, enum: [copper, fiber, dac]}
                site: {type: string}
                building: {type: string}
                room: {type: string}
                enabled: {type: boolean}
      responses:
        '201': {description: DCIM port persisted}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM operator token}
  /api/v1/dcim/cables:
    post:
      summary: Connect two compatible DCIM ports with a cable and human trace path
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, cable_id, a_owner_type, a_owner_code, a_port_name, b_owner_type, b_owner_code, b_port_name, medium, path_segments]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                cable_id: {type: string}
                a_owner_type: {type: string, enum: [equipment, patch_panel]}
                a_owner_code: {type: string}
                a_port_name: {type: string}
                b_owner_type: {type: string, enum: [equipment, patch_panel]}
                b_owner_code: {type: string}
                b_port_name: {type: string}
                medium: {type: string, enum: [copper, fiber, dac]}
                status: {type: string, enum: [planned, installed, retired]}
                path_segments:
                  type: array
                  items: {type: string}
                length_m: {type: number}
                label: {type: string}
      responses:
        '201': {description: Cable persisted}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM operator token}
  /api/v1/dcim/cable-trace:
    get:
      summary: Trace a DCIM cable with endpoints and human path
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: cable_id
          in: query
          required: true
          schema: {type: string}
      responses:
        '200': {description: Cable trace payload}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM locator token}
        '404': {description: Cable not found}

  /api/v1/dcim/verify-scan:
    post:
      summary: Verify a field QR scan payload against the expected equipment locator
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, asset_tag, payload]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                asset_tag: {type: string}
                payload: {type: string}
      responses:
        '200': {description: Scan proof and verification result}
        '400': {description: Validation error or QR mismatch}
        '401': {description: Missing or invalid DCIM identification token}

  /api/v1/ipam/allocate:
    post:
      summary: Allocate an IP address with idempotency
      description: Requires a Bearer token carrying ipam.allocate when API authentication is enabled.
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, vrf, prefix, hostname, idempotency_key]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                vrf:
                  type: string
                prefix:
                  type: string
                hostname:
                  type: string
                idempotency_key:
                  type: string
                site_code:
                  type: string
                environment:
                  type: string
      responses:
        '201':
          description: Address allocated
        '200':
          description: Existing idempotent allocation returned
        '400':
          description: Validation error
        '401':
          description: Missing or invalid Bearer token when authentication is enabled

  /api/v1/sot/objects:
    get:
      summary: Get or list Source of Truth objects
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: key
          in: query
          required: false
          schema: {type: string}
        - name: kind
          in: query
          required: false
          schema: {type: string, enum: [generic, device, interface, service, application]}
        - name: tag
          in: query
          required: false
          schema: {type: string}
        - name: limit
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 500}
        - name: cursor
          in: query
          required: false
          schema: {type: string}
      responses:
