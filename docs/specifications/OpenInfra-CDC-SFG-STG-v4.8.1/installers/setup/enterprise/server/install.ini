[storage]
vgname = datavg
lvname = openinfradata_lv
lvsize = 1TB

[api]
backend_endpoint = https://enterprise-vip.openinfra.example.com

[identity]
peer_nodes = ent-backend02.openinfra.example.com,ent-backend03.openinfra.example.com

[auth]
mode = standard
postgresql_user_ref = env:OPENINFRA_POSTGRES_USER
postgresql_password_ref = env:OPENINFRA_POSTGRES_PASSWORD
