name: OpenInfra Release Packaging

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONHASHSEED: '0'

jobs:
  release-packaging:
    name: Reproducible packaging certification
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout complete history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'
          cache: pip

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade "pip>=26.0"
          python -m pip install -e '.[postgresql,ldap]'
          python -m pip install --requirement requirements/dev.txt

      - name: Resolve deterministic source epoch
        id: epoch
        shell: bash
        run: echo "value=$(git log -1 --pretty=%ct)" >> "$GITHUB_OUTPUT"

      - name: Validate deterministic build backend and migration catalogue
        run: |
          ruff format --check \
            openinfra_build_backend.py \
            src/openinfra/quality/migration_packaging.py \
            scripts/build_migration_catalog.py \
            tests/unit/test_openinfra_build_backend.py \
            tests/unit/test_migration_packaging.py
          ruff check \
            openinfra_build_backend.py \
            src/openinfra/quality/migration_packaging.py \
            scripts/build_migration_catalog.py \
            tests/unit/test_openinfra_build_backend.py \
            tests/unit/test_migration_packaging.py
          mypy openinfra_build_backend.py src/openinfra/quality/migration_packaging.py
          python -m pytest -q --no-cov \
            tests/unit/test_openinfra_build_backend.py \
            tests/unit/test_migration_packaging.py

      - name: Run blocking packaging certification
        env:
          OPENINFRA_RELEASE_SIGNING_PRIVATE_KEY_B64: ${{ secrets.OPENINFRA_RELEASE_SIGNING_PRIVATE_KEY_B64 }}
        run: |
          python scripts/release_packaging_audit.py \
            --project-root . \
            --output-dir artifacts/release-packaging \
            --source-date-epoch "${{ steps.epoch.outputs.value }}" \
            --signing-key-from-env \
            --enforce

      - name: Verify complete standalone migration catalogue
        shell: bash
        run: |
          version="$(cat VERSION)"
          python scripts/build_migration_catalog.py \
            --project-root . \
            --output-dir artifacts/migration-rebuild \
            --source-date-epoch "${{ steps.epoch.outputs.value }}" \
            --json
          cmp \
            "artifacts/release-packaging/openinfra-${version}-migrations.zip" \
            "artifacts/migration-rebuild/openinfra-${version}-migrations.zip"
          python - <<'PYTHON'
          from pathlib import Path
          from openinfra.quality.migration_packaging import (
              MigrationCatalog,
              MigrationCatalogArchiveVerifier,
          )

          epoch = int("${{ steps.epoch.outputs.value }}")
          version = Path("VERSION").read_text(encoding="utf-8").strip()
          snapshot = MigrationCatalog().load(Path.cwd(), epoch)
          assert snapshot.count == 60
          assert snapshot.first_version == "0001"
          assert snapshot.last_version == "0060"
          MigrationCatalogArchiveVerifier().verify(
              Path(f"artifacts/release-packaging/openinfra-{version}-migrations.zip"),
              snapshot,
          )
          PYTHON
          rm -rf artifacts/migration-rebuild

      - name: Verify checksums and detached signature
        shell: bash
        run: |
          cd artifacts/release-packaging
          sha256sum --check "openinfra-$(cat ../../VERSION)-SHA256SUMS.txt"
          python - <<'PYTHON'
          from pathlib import Path
          from openinfra.quality.release_packaging import ReleaseSignatureVerifier

          version = Path("../../VERSION").read_text(encoding="utf-8").strip()
          manifest = Path(f"openinfra-{version}-release-manifest.json")
          ReleaseSignatureVerifier.verify(
              manifest.with_suffix(manifest.suffix + ".pub"),
              manifest,
              manifest.with_suffix(manifest.suffix + ".sig"),
          )
          PYTHON

      - name: Upload certified release artefacts
        uses: actions/upload-artifact@v6
        with:
          name: openinfra-release-packaging-${{ github.ref_name }}
          path: artifacts/release-packaging/*
          if-no-files-found: error
          retention-days: 90
