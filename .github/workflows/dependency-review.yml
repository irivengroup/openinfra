name: OpenInfra Dependency Review

on:
  pull_request:
    branches: ['**']

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency review / PR vulnerability gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
