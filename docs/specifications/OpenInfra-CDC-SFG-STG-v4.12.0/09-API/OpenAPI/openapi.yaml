openapi: 3.1.0
info:
  title: OpenInfra API Foundation
  version: 0.34.20
  description: >-
    API OpenInfra organisée dans Swagger et ReDoc par composant, puis par contexte métier.
    Chaque opération appartient à un contexte unique afin de conserver une navigation déterministe.
    Les collections volumineuses utilisent des curseurs opaques signés, liés au tenant, aux filtres
    et au tri. Les curseurs numériques historiques restent temporairement acceptés pour compatibilité.
components:
  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: OpenInfra API token
  requestBodies:
    FieldSheetAction:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [tenant_id, sheet_id]
            properties:
              tenant_id: {type: string}
              actor: {type: string, default: api}
              sheet_id: {type: string, format: uuid}
paths:
  /:
    get:
      summary: API discovery document
      responses:
        '200':
          description: Service metadata and canonical operational endpoints
      tags:
      - Plateforme · Exploitation et documentation
      x-openinfra-component: Plateforme
      x-openinfra-context: Exploitation et documentation
  /api/v1:
    get:
      summary: API v1 discovery document
      responses:
        '200':
          description: API v1 base path and operational endpoint links
      tags:
      - Plateforme · Exploitation et documentation
      x-openinfra-component: Plateforme
      x-openinfra-context: Exploitation et documentation
  /docs:
    get:
      summary: Swagger UI documentation
      responses:
        '200':
          description: Interactive Swagger UI backed by /openapi.yaml
      tags:
      - Plateforme · Exploitation et documentation
      x-openinfra-component: Plateforme
      x-openinfra-context: Exploitation et documentation
  /swagger:
    get:
      summary: Swagger UI documentation alias
      responses:
        '200':
          description: Alias for the interactive Swagger UI
      tags:
      - Plateforme · Exploitation et documentation
      x-openinfra-component: Plateforme
      x-openinfra-context: Exploitation et documentation
  /redoc:
    get:
      summary: ReDoc documentation
      responses:
        '200':
          description: ReDoc documentation backed by /openapi.yaml
      tags:
      - Plateforme · Exploitation et documentation
      x-openinfra-component: Plateforme
      x-openinfra-context: Exploitation et documentation
  /openapi.yaml:
    get:
      summary: Canonical OpenAPI YAML document
      responses:
        '200':
          description: OpenAPI 3.1 YAML document
        '503':
          description: OpenAPI document is not available in the runtime filesystem
      tags:
      - Plateforme · Exploitation et documentation
      x-openinfra-component: Plateforme
      x-openinfra-context: Exploitation et documentation
  /api/v1/openapi.yaml:
    get:
      summary: Versioned OpenAPI YAML document alias
      responses:
        '200':
          description: OpenAPI 3.1 YAML document
        '503':
          description: OpenAPI document is not available in the runtime filesystem
      tags:
      - Plateforme · Exploitation et documentation
      x-openinfra-component: Plateforme
      x-openinfra-context: Exploitation et documentation
  /metrics:
    get:
      summary: Prometheus operational metrics
      responses:
        '200':
          description: Tenant-neutral Prometheus exposition document
          content:
            text/plain:
              schema:
                type: string
      tags:
      - Plateforme · Observabilité et capacité
      x-openinfra-component: Plateforme
      x-openinfra-context: Observabilité et capacité
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: API is alive
      tags:
      - Plateforme · Exploitation et documentation
      x-openinfra-component: Plateforme
      x-openinfra-context: Exploitation et documentation
  /ready:
    get:
      summary: Runtime readiness probe validating persistence and the selected database schema state
      responses:
        '200':
          description: Selected backend is reachable and schema is ready
        '503':
          description: Backend or schema is not ready
      tags:
      - Plateforme · Exploitation et documentation
      x-openinfra-component: Plateforme
      x-openinfra-context: Exploitation et documentation
  /api/v1/version:
    get:
      summary: Version
      responses:
        '200':
          description: Version payload
      tags:
      - Plateforme · Exploitation et documentation
      x-openinfra-component: Plateforme
      x-openinfra-context: Exploitation et documentation
  /api/v1/license/status:
    get:
      summary: État de la licence runtime offline
      description: Retourne uniquement l'état évalué et les métadonnées non sensibles de la licence commerciale.
      responses:
        '200':
          description: État courant de la licence, y compris expiration, grâce et quota d'hôtes.
      tags:
      - Plateforme · Licence runtime
      x-openinfra-component: Plateforme
      x-openinfra-context: Licence runtime
  /api/v1/license/activate:
    post:
      summary: Activer une licence runtime signée
      description: Importe un entitlement Ed25519 signé et lié à l'installation, l'entreprise, l'édition et au quota d'hôtes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [entitlement]
              properties:
                actor: {type: string, default: api}
                entitlement:
                  type: object
                  additionalProperties: true
      responses:
        '200': {description: Licence activée et état évalué}
        '400': {description: Entitlement invalide, non approuvé ou incompatible}
      tags:
      - Plateforme · Licence runtime
      x-openinfra-component: Plateforme
      x-openinfra-context: Licence runtime
  /api/v1/license/renew:
    post:
      summary: Renouveler une licence runtime signée
      description: Remplace l'entitlement actif par un entitlement signé de même licence dont l'échéance est strictement postérieure.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [entitlement]
              properties:
                actor: {type: string, default: api}
                entitlement:
                  type: object
                  additionalProperties: true
      responses:
        '200': {description: Licence renouvelée et état évalué}
        '400': {description: Renouvellement invalide ou incompatible}
      tags:
      - Plateforme · Licence runtime
      x-openinfra-component: Plateforme
      x-openinfra-context: Licence runtime
  /api/v1/reference/countries:
    get:
      summary: ISO country reference grouped by continent
      description: Returns ISO-3166 alpha-2 country options grouped by continent for web select fields.
      responses:
        '200':
          description: Grouped ISO country catalog
      tags:
      - Plateforme · Référentiels
      x-openinfra-component: Plateforme
      x-openinfra-context: Référentiels
  /api/v1/database/schema:
    get:
      summary: Database schema migration status
      responses:
        '200':
          description: Selected database schema is up to date or JSON backend does not require migrations
        '409':
          description: Selected database schema has pending migrations or checksum drift
      tags:
      - Plateforme · Base de données
      x-openinfra-component: Plateforme
      x-openinfra-context: Base de données
  /api/v1/database/routing:
    get:
      summary: PostgreSQL primary/read-replica routing status
      description: Returns replica eligibility, replay lag, fallback policy and per-worker routing counters. Requires SECURITY_ADMIN when 
        authentication is enabled.
      security:
      - bearerToken: []
      parameters:
      - {name: tenant_id, in: query, required: false, schema: {type: string, default: default}}
      responses:
        '200':
          description: Read-routing status or a disabled status for the JSON backend
        '401':
          description: Missing or invalid bearer token
        '503':
          description: Routing status provider is unavailable
      tags:
      - Plateforme · Base de données
      x-openinfra-component: Plateforme
      x-openinfra-context: Base de données
  /api/v1/search/global:
    get:
      summary: Search OpenInfra business data across RSOT, IPAM and Discovery
      description: Returns component-grouped global search results for the web header and CLI. Components the caller cannot access are 
        skipped instead of leaking protected data.
      security:
      - bearerToken: []
      parameters:
      - {name: tenant_id, in: query, required: true, schema: {type: string}}
      - {name: query, in: query, required: true, schema: {type: string, minLength: 2, maxLength: 128}}
      - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 25, default: 5}}
      - {name: include_inactive_discovery, in: query, required: false, schema: {type: boolean, default: false}}
      responses:
        '200':
          description: Component-grouped global search result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid Bearer token when authentication is enabled

      tags:
      - Plateforme · Recherche globale
      x-openinfra-component: Plateforme
      x-openinfra-context: Recherche globale
  /api/v1/editions/policies:
    get:
      summary: List edition capabilities and quota policies
      description: Returns Lite, Pro and Enterprise feature capabilities and runtime quota limits used by CLI, API and the web 
        administration panel.
      security:
      - bearerToken: []
      parameters:
      - {name: tenant_id, in: query, required: false, schema: {type: string, default: default}}
      responses:
        '200':
          description: Edition policy catalog
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token when authentication is enabled
      tags:
      - Plateforme · Éditions et capacités
      x-openinfra-component: Plateforme
      x-openinfra-context: Éditions et capacités
  /api/v1/editions/feature-check:
    get:
      summary: Check whether an edition allows a capability
      security:
      - bearerToken: []
      parameters:
      - {name: tenant_id, in: query, required: true, schema: {type: string}}
      - {name: edition, in: query, required: true, schema: {type: string, enum: [lite, pro, enterprise]}}
      - {name: capability, in: query, required: true, schema: {type: string, enum: [core_rsot, dcim, ipam, rbac, audit, import_export, 
              distributed_discovery_agents, installer_agent_scope]}}
      responses:
        '200':
          description: Feature gate decision
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token when authentication is enabled
      tags:
      - Plateforme · Éditions et capacités
      x-openinfra-component: Plateforme
      x-openinfra-context: Éditions et capacités
  /api/v1/editions/quota-check:
    get:
      summary: Check tenant usage against an edition quota
      security:
      - bearerToken: []
      parameters:
      - {name: tenant_id, in: query, required: true, schema: {type: string}}
      - {name: edition, in: query, required: true, schema: {type: string, enum: [lite, pro, enterprise]}}
      - {name: resource, in: query, required: true, schema: {type: string, enum: [equipment, subnet_vlan, ip_dns_record, user, 
              discovery_collector]}}
      - {name: requested_increment, in: query, required: false, schema: {type: integer, minimum: 0, default: 1}}
      responses:
        '200':
          description: Runtime quota decision
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token when authentication is enabled

      tags:
      - Plateforme · Éditions et capacités
      x-openinfra-component: Plateforme
      x-openinfra-context: Éditions et capacités
  /api/v1/security/whoami:
    post:
      summary: Validate an API token and return the authenticated principal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, token]
              properties:
                tenant_id:
                  type: string
                token:
                  type: string
      responses:
        '200':
          description: Authenticated principal
        '400':
          description: Validation error
        '401':
          description: Invalid token

      tags:
      - Sécurité · Authentification et jetons
      x-openinfra-component: Sécurité
      x-openinfra-context: Authentification et jetons
  /api/v1/security/tokens:
    get:
      summary: List API token metadata without returning token hashes or secrets
      security:
      - bearerToken: []
      parameters:
      - name: tenant_id
        in: query
        required: true
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 500
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: include_inactive
        in: query
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Paginated token metadata
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
      tags:
      - Sécurité · Authentification et jetons
      x-openinfra-component: Sécurité
      x-openinfra-context: Authentification et jetons
  /api/v1/security/revoke-token:
    post:
      summary: Revoke an API token using a security administrator token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, target_token]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                target_token:
                  type: string
                admin_token:
                  type: string
      responses:
        '200':
          description: Revocation result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
      tags:
      - Sécurité · Authentification et jetons
      x-openinfra-component: Sécurité
      x-openinfra-context: Authentification et jetons
  /api/v1/security/rotate-token:
    post:
      summary: Rotate a security administrator token and revoke the previous token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, current_token]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                current_token:
                  type: string
                subject:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
                token:
                  type: string
                ttl_seconds:
                  type: integer
                  minimum: 60
      responses:
        '201':
          description: Replacement token created
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
      tags:
      - Sécurité · Authentification et jetons
      x-openinfra-component: Sécurité
      x-openinfra-context: Authentification et jetons
  /api/v1/auth/saml/acs:
    post:
      summary: Validate a trusted SAML 2.0 assertion and issue an OpenInfra session token
      description: >-
        The identity-provider configuration, certificates and group-to-role mappings are loaded
        exclusively from the trusted server configuration. Client requests may submit only the
        SAMLResponse and optional RelayState fields.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [SAMLResponse]
              additionalProperties: false
              properties:
                SAMLResponse:
                  type: string
                  minLength: 1
                RelayState:
                  type: string
          application/json:
            schema:
              type: object
              required: [SAMLResponse]
              additionalProperties: false
              properties:
                SAMLResponse:
                  type: string
                  minLength: 1
                RelayState:
                  type: string
      responses:
        '200':
          description: SAML assertion accepted and OpenInfra token issued
        '400':
          description: Invalid request or incomplete trusted SAML configuration
        '401':
          description: Assertion rejected or no RBAC mapping applies
      tags:
      - Sécurité · Authentification fédérée
      x-openinfra-component: Sécurité
      x-openinfra-context: Authentification fédérée
  /api/v1/identity/team-sync:
    post:
      summary: Synchronize identities and managed group memberships from a trusted provider
      description: >-
        Supports LDAP, OAuth, Auth Proxy and Okta sources configured exclusively on the server.
        The request cannot override provider endpoints, credentials, certificates or mappings.
      security:
      - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_id]
              additionalProperties: false
              properties:
                source_id:
                  type: string
                  pattern: '^[a-z][a-z0-9_.:-]{1,63}$'
                actor:
                  type: string
                  default: api
      responses:
        '200':
          description: Idempotent Team Sync result and membership changes
        '400':
          description: Invalid request, provider payload or trusted source configuration
        '401':
          description: Missing or invalid SECURITY_ADMIN bearer token
      tags:
      - Sécurité · Synchronisation des équipes
      x-openinfra-component: Sécurité
      x-openinfra-context: Synchronisation des équipes
  /api/v1/identity/users:
    post:
      summary: Create or update an IAM user
      security:
      - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, username, display_name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                username:
                  type: string
                display_name:
                  type: string
                email:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: IAM user persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
      tags:
      - Sécurité · Identités et groupes
      x-openinfra-component: Sécurité
      x-openinfra-context: Identités et groupes
  /api/v1/identity/groups:
    post:
      summary: Create or update an IAM group
      security:
      - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name, display_name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                name:
                  type: string
                display_name:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: IAM group persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
      tags:
      - Sécurité · Identités et groupes
      x-openinfra-component: Sécurité
      x-openinfra-context: Identités et groupes
  /api/v1/identity/group-memberships:
    post:
      summary: Add a user to an IAM group
      security:
      - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, username, group_name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                username:
                  type: string
                group_name:
                  type: string
      responses:
        '201':
          description: IAM group membership persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
      tags:
      - Sécurité · Identités et groupes
      x-openinfra-component: Sécurité
      x-openinfra-context: Identités et groupes
  /api/v1/identity/user-roles:
    post:
      summary: Grant a built-in role directly to a user
      security:
      - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, username, role]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                username:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: User role grant result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
      tags:
      - Sécurité · Identités et groupes
      x-openinfra-component: Sécurité
      x-openinfra-context: Identités et groupes
  /api/v1/identity/group-roles:
    post:
      summary: Grant a built-in role to a group
      security:
      - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, group_name, role]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                group_name:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: Group role grant result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
      tags:
      - Sécurité · Identités et groupes
      x-openinfra-component: Sécurité
      x-openinfra-context: Identités et groupes
  /api/v1/identity/effective:
    get:
      summary: Return effective roles for an IAM subject
      security:
      - bearerToken: []
      parameters:
      - name: tenant_id
        in: query
        required: true
        schema:
          type: string
      - name: subject
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Effective identity roles
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
      tags:
      - Sécurité · Identités et groupes
      x-openinfra-component: Sécurité
      x-openinfra-context: Identités et groupes
  /api/v1/access/rules:
    get:
      summary: List ABAC access policy rules
      security:
      - bearerToken: []
      parameters:
      - name: tenant_id
        in: query
        required: true
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 500
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: include_inactive
        in: query
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Paginated ABAC rules
        '400':
          description: Validation error
        '401':
          description: Missing or invalid access policy administrator token
      tags:
      - Sécurité · Autorisations
      x-openinfra-component: Sécurité
      x-openinfra-context: Autorisations
    post:
      summary: Create or update an ABAC access policy rule
      security:
      - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name, permission, effect]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                name:
                  type: string
                permission:
                  type: string
                effect:
                  type: string
                  enum: [allow, deny]
                subjects:
                  type: array
                  items:
                    type: string
                roles:
                  type: array
                  items:
                    type: string
                site_codes:
                  type: array
                  items:
                    type: string
                environments:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: ABAC rule persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid access policy administrator token
      tags:
      - Sécurité · Autorisations
      x-openinfra-component: Sécurité
      x-openinfra-context: Autorisations
  /api/v1/access/evaluate:
    post:
      summary: Evaluate a Bearer token against a contextual ABAC request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, token, permission]
              properties:
                tenant_id:
                  type: string
                token:
                  type: string
                permission:
                  type: string
                site_code:
                  type: string
                environment:
                  type: string
      responses:
        '200':
          description: ABAC evaluation result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
      tags:
      - Sécurité · Autorisations
      x-openinfra-component: Sécurité
      x-openinfra-context: Autorisations
  /api/v1/access/deactivate-rule:
    post:
      summary: Deactivate an ABAC access policy rule
      security:
      - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: Deactivation result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid access policy administrator token
      tags:
      - Sécurité · Autorisations
      x-openinfra-component: Sécurité
      x-openinfra-context: Autorisations
  /api/v1/audit/events:
    get:
      summary: List audit events with pagination, filters and integrity hashes
      security:
      - bearerToken: []
      parameters:
      - name: tenant_id
        in: query
        required: true
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
