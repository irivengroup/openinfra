name: Support Readiness

on:
  workflow_dispatch:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']
    tags: ['v*']

permissions:
  contents: read

jobs:
  support-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install validation dependencies
        run: python -m pip install -r requirements/dev.txt

      - name: Validate EPIC-1806 support model
        run: |
          python scripts/support_readiness.py \
            --project-root . \
            --output artifacts/support-readiness/support-readiness.json \
            --ephemeral-key \
            --enforce

      - name: Run support readiness regression tests
        run: |
          python -m pytest \
            tests/unit/test_support_readiness.py \
            tests/integration/test_support_readiness_contract.py \
            --no-cov

      - name: Upload support readiness evidence
        uses: actions/upload-artifact@v6
        with:
          name: support-readiness-${{ github.sha }}
          path: artifacts/support-readiness/
          if-no-files-found: error
          retention-days: 365
