name: openinfra-runtime

services:
  postgres:
    image: postgres:16-alpine
    container_name: openinfra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${OPENINFRA_POSTGRES_DB:?OPENINFRA_POSTGRES_DB is required}
      POSTGRES_USER: ${OPENINFRA_POSTGRES_USER:?OPENINFRA_POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${OPENINFRA_POSTGRES_PASSWORD:?OPENINFRA_POSTGRES_PASSWORD is required}
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - max_connections=120
      - -c
      - wal_level=replica
      - -c
      - log_min_duration_statement=500
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - openinfra-postgres-data:/var/lib/postgresql/data
    networks:
      - openinfra

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: openinfra/runtime:${OPENINFRA_IMAGE_TAG:-0.29.13}
    container_name: openinfra-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OPENINFRA_DATABASE_DSN: postgresql://${OPENINFRA_POSTGRES_USER:?OPENINFRA_POSTGRES_USER is required}:${OPENINFRA_POSTGRES_PASSWORD:?OPENINFRA_POSTGRES_PASSWORD is required}@postgres:5432/${OPENINFRA_POSTGRES_DB:?OPENINFRA_POSTGRES_DB is required}
    command:
      - openinfra
      - database
      - apply-migrations
      - --root
      - /app/installers/migrations/postgresql
    networks:
      - openinfra

  auth-bootstrap:
    image: openinfra/runtime:${OPENINFRA_IMAGE_TAG:-0.29.13}
    container_name: openinfra-auth-bootstrap
    restart: "no"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      OPENINFRA_DATABASE_DSN: postgresql://${OPENINFRA_POSTGRES_USER:?OPENINFRA_POSTGRES_USER is required}:${OPENINFRA_POSTGRES_PASSWORD:?OPENINFRA_POSTGRES_PASSWORD is required}@postgres:5432/${OPENINFRA_POSTGRES_DB:?OPENINFRA_POSTGRES_DB is required}
    command:
      - openinfra
      - security
      - bootstrap-token
      - --backend
      - postgresql
      - --tenant
      - default
      - --subject
      - docker-runtime
      - --role
      - admin
      - --token
      - ${OPENINFRA_BOOTSTRAP_TOKEN:?OPENINFRA_BOOTSTRAP_TOKEN is required}
    networks:
      - openinfra

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: openinfra/runtime:${OPENINFRA_IMAGE_TAG:-0.29.13}
    container_name: openinfra-api
    restart: unless-stopped
    depends_on:
      auth-bootstrap:
        condition: service_completed_successfully
    environment:
      OPENINFRA_DATABASE_DSN: postgresql://${OPENINFRA_POSTGRES_USER:?OPENINFRA_POSTGRES_USER is required}:${OPENINFRA_POSTGRES_PASSWORD:?OPENINFRA_POSTGRES_PASSWORD is required}@postgres:5432/${OPENINFRA_POSTGRES_DB:?OPENINFRA_POSTGRES_DB is required}
      OPENINFRA_AUTH_REQUIRED: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/ready', timeout=3).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      - "${OPENINFRA_API_BIND:-127.0.0.1}:${OPENINFRA_API_PORT:-8080}:8080"
    networks:
      - openinfra


  web:
    image: openinfra/runtime:${OPENINFRA_IMAGE_TAG:-0.29.13}
    container_name: openinfra-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      OPENINFRA_WEB_HOST: "0.0.0.0"
      OPENINFRA_WEB_PORT: "2006"
      OPENINFRA_WEB_BACKEND_URL: ${OPENINFRA_WEB_BACKEND_URL:-http://api:8080}
      OPENINFRA_WEB_PUBLIC_API_BASE_URL: ${OPENINFRA_WEB_PUBLIC_API_BASE_URL:-/api}
      OPENINFRA_WEB_ALLOW_INSECURE_BACKEND: ${OPENINFRA_WEB_ALLOW_INSECURE_BACKEND:-true}
      OPENINFRA_EDITION: ${OPENINFRA_WEB_EDITION:-pro}
      OPENINFRA_WEB_AUTH_MODE: ${OPENINFRA_WEB_AUTH_MODE:-standard}
    command:
      - openinfra-web
      - --host
      - 0.0.0.0
      - --port
      - "2006"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:2006/health', timeout=3).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      - "${OPENINFRA_WEB_BIND:-127.0.0.1}:${OPENINFRA_WEB_PORT:-2006}:2006"
    networks:
      - openinfra

  pgadmin:
    image: ${OPENINFRA_PGADMIN_IMAGE:-dpage/pgadmin4:latest}
    container_name: openinfra-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${OPENINFRA_PGADMIN_EMAIL:?OPENINFRA_PGADMIN_EMAIL is required}
      PGADMIN_DEFAULT_PASSWORD: ${OPENINFRA_PGADMIN_PASSWORD:?OPENINFRA_PGADMIN_PASSWORD is required}
      PGADMIN_DISABLE_POSTFIX: "true"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: "10"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1/misc/ping', timeout=3).read()"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 20s
    ports:
      - "${OPENINFRA_PGADMIN_BIND:-127.0.0.1}:${OPENINFRA_PGADMIN_PORT:-5050}:80"
    volumes:
      - openinfra-pgadmin-data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - openinfra

  smoke:
    image: openinfra/runtime:${OPENINFRA_IMAGE_TAG:-0.29.13}
    container_name: openinfra-smoke
    restart: "no"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      OPENINFRA_API_BASE_URL: http://api:8080
      OPENINFRA_WEB_BASE_URL: http://web:2006
      OPENINFRA_DATABASE_DSN: postgresql://${OPENINFRA_POSTGRES_USER:?OPENINFRA_POSTGRES_USER is required}:${OPENINFRA_POSTGRES_PASSWORD:?OPENINFRA_POSTGRES_PASSWORD is required}@postgres:5432/${OPENINFRA_POSTGRES_DB:?OPENINFRA_POSTGRES_DB is required}
      OPENINFRA_BOOTSTRAP_TOKEN: ${OPENINFRA_BOOTSTRAP_TOKEN:?OPENINFRA_BOOTSTRAP_TOKEN is required}
    volumes:
      - ./docker/openinfra-runtime-smoke.py:/app/docker/openinfra-runtime-smoke.py:ro
    command: ["python", "/app/docker/openinfra-runtime-smoke.py"]
    profiles:
      - validation
    networks:
      - openinfra

volumes:
  openinfra-postgres-data:
  openinfra-pgadmin-data:

networks:
  openinfra:
    driver: bridge
