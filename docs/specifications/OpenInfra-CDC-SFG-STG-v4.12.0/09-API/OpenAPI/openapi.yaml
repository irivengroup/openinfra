      description: Registers proposed typed changes without mutating RSOT, IPAM, DCIM, flow declarations or any production system.
      security: [bearerToken: []]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name, description, owner, idempotency_key, changes]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                name: {type: string, minLength: 3, maxLength: 200}
                description: {type: string, minLength: 10, maxLength: 2000}
                owner: {type: string, minLength: 2, maxLength: 200}
                idempotency_key: {type: string, minLength: 8, maxLength: 128}
                site: {type: string, nullable: true}
                environment: {type: string, nullable: true}
                criticality: {type: string, nullable: true}
                changes:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: object
                    required: [kind, target_key]
                    properties:
                      kind: {type: string, enum: [equipment-move, equipment-add, equipment-remove, equipment-outage, vlan-change, vrf-change,
                          subnet-change, dns-change, firewall-change, pdu-outage]}
                      target_key: {type: string}
                      before: {type: object, additionalProperties: true}
                      after: {type: object, additionalProperties: true}
                      assumptions: {type: array, maxItems: 50, items: {type: string}}
      responses:
        '201': {description: Created or idempotently reused simulation scenario}
        '400': {description: Invalid scenario or typed change payload}
        '401': {description: Missing or invalid simulation writer token}
      tags:
      - Simulation · Scénarios
