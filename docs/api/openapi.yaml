              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                license_reference: {type: string}
                assigned_quantity: {type: integer, minimum: 0}
                notes: {type: string}
      responses:
        '200': {description: Software license assignment updated}
        '401': {description: ITAM write token required}
        '400': {description: Validation error or unknown license entitlement}
