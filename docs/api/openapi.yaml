openapi: 3.1.0
info:
  title: OpenInfra API Foundation
  version: 0.29.101
components:
  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: OpenInfra API token
  requestBodies:
    FieldSheetAction:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [tenant_id, sheet_id]
            properties:
              tenant_id: {type: string}
              actor: {type: string, default: api}
              sheet_id: {type: string, format: uuid}
paths:
  /:
    get:
      summary: API discovery document
      responses:
        '200':
          description: Service metadata and canonical operational endpoints
  /api/v1:
    get:
      summary: API v1 discovery document
      responses:
        '200':
          description: API v1 base path and operational endpoint links
  /docs:
    get:
      summary: Swagger UI documentation
      responses:
        '200':
          description: Interactive Swagger UI backed by /openapi.yaml
  /swagger:
    get:
      summary: Swagger UI documentation alias
      responses:
        '200':
          description: Alias for the interactive Swagger UI
  /redoc:
    get:
      summary: ReDoc documentation
      responses:
        '200':
          description: ReDoc documentation backed by /openapi.yaml
  /openapi.yaml:
    get:
      summary: Canonical OpenAPI YAML document
      responses:
        '200':
          description: OpenAPI 3.1 YAML document
        '503':
          description: OpenAPI document is not available in the runtime filesystem
  /api/v1/openapi.yaml:
    get:
      summary: Versioned OpenAPI YAML document alias
      responses:
        '200':
          description: OpenAPI 3.1 YAML document
        '503':
          description: OpenAPI document is not available in the runtime filesystem
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: API is alive
  /ready:
    get:
      summary: Runtime readiness probe validating persistence and PostgreSQL schema state
      responses:
        '200':
          description: Backend is reachable and schema is ready
        '503':
          description: Backend or schema is not ready
  /api/v1/version:
    get:
      summary: Version
      responses:
        '200':
          description: Version payload
  /api/v1/reference/countries:
    get:
      summary: ISO country reference grouped by continent
      description: Returns ISO-3166 alpha-2 country options grouped by continent for web select fields.
      responses:
        '200':
          description: Grouped ISO country catalog
  /api/v1/database/schema:
    get:
      summary: PostgreSQL schema migration status
      responses:
        '200':
          description: Schema is up to date or JSON backend does not require migrations
        '409':
          description: PostgreSQL schema has pending migrations or checksum drift
  /api/v1/search/global:
    get:
      summary: Search OpenInfra business data across RSOT, IPAM and Discovery
      description: Returns component-grouped global search results for the web header and CLI. Components the caller cannot access are skipped instead of leaking protected data.
      security:
        - bearerToken: []
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: query, in: query, required: true, schema: {type: string, minLength: 2, maxLength: 128}}
        - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 25, default: 5}}
        - {name: include_inactive_discovery, in: query, required: false, schema: {type: boolean, default: false}}
      responses:
        '200':
          description: Component-grouped global search result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid Bearer token when authentication is enabled

  /api/v1/editions/policies:
    get:
      summary: List edition capabilities and quota policies
      description: Returns Lite, Pro and Enterprise feature capabilities and runtime quota limits used by CLI, API and the web administration panel.
      security:
        - bearerToken: []
      parameters:
        - {name: tenant_id, in: query, required: false, schema: {type: string, default: default}}
      responses:
        '200':
          description: Edition policy catalog
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token when authentication is enabled
  /api/v1/editions/feature-check:
    get:
      summary: Check whether an edition allows a capability
      security:
        - bearerToken: []
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: edition, in: query, required: true, schema: {type: string, enum: [lite, pro, enterprise]}}
        - {name: capability, in: query, required: true, schema: {type: string, enum: [core_rsot, dcim, ipam, rbac, audit, import_export, distributed_discovery_agents, installer_agent_scope]}}
      responses:
        '200':
          description: Feature gate decision
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token when authentication is enabled
  /api/v1/editions/quota-check:
    get:
      summary: Check tenant usage against an edition quota
      security:
        - bearerToken: []
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: edition, in: query, required: true, schema: {type: string, enum: [lite, pro, enterprise]}}
        - {name: resource, in: query, required: true, schema: {type: string, enum: [equipment, subnet_vlan, ip_dns_record, user, discovery_collector]}}
        - {name: requested_increment, in: query, required: false, schema: {type: integer, minimum: 0, default: 1}}
      responses:
        '200':
          description: Runtime quota decision
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token when authentication is enabled

  /api/v1/security/whoami:
    post:
      summary: Validate an API token and return the authenticated principal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, token]
              properties:
                tenant_id:
                  type: string
                token:
                  type: string
      responses:
        '200':
          description: Authenticated principal
        '400':
          description: Validation error
        '401':
          description: Invalid token

  /api/v1/security/tokens:
    get:
      summary: List API token metadata without returning token hashes or secrets
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated token metadata
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/security/revoke-token:
    post:
      summary: Revoke an API token using a security administrator token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, target_token]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                target_token:
                  type: string
                admin_token:
                  type: string
      responses:
        '200':
          description: Revocation result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/security/rotate-token:
    post:
      summary: Rotate a security administrator token and revoke the previous token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, current_token]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                current_token:
                  type: string
                subject:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
                token:
                  type: string
                ttl_seconds:
                  type: integer
                  minimum: 60
      responses:
        '201':
          description: Replacement token created
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/users:
    post:
      summary: Create or update an IAM user
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, username, display_name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                username:
                  type: string
                display_name:
                  type: string
                email:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: IAM user persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/groups:
    post:
      summary: Create or update an IAM group
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name, display_name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                name:
                  type: string
                display_name:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: IAM group persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/group-memberships:
    post:
      summary: Add a user to an IAM group
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, username, group_name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                username:
                  type: string
                group_name:
                  type: string
      responses:
        '201':
          description: IAM group membership persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/user-roles:
    post:
      summary: Grant a built-in role directly to a user
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, username, role]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                username:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: User role grant result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/group-roles:
    post:
      summary: Grant a built-in role to a group
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, group_name, role]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                group_name:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: Group role grant result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/effective:
    get:
      summary: Return effective roles for an IAM subject
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: subject
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Effective identity roles
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/access/rules:
    get:
      summary: List ABAC access policy rules
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated ABAC rules
        '400':
          description: Validation error
        '401':
          description: Missing or invalid access policy administrator token
    post:
      summary: Create or update an ABAC access policy rule
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name, permission, effect]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                name:
                  type: string
                permission:
                  type: string
                effect:
                  type: string
                  enum: [allow, deny]
                subjects:
                  type: array
                  items:
                    type: string
                roles:
                  type: array
                  items:
                    type: string
                site_codes:
                  type: array
                  items:
                    type: string
                environments:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: ABAC rule persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid access policy administrator token
  /api/v1/access/evaluate:
    post:
      summary: Evaluate a Bearer token against a contextual ABAC request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, token, permission]
              properties:
                tenant_id:
                  type: string
                token:
                  type: string
                permission:
                  type: string
                site_code:
                  type: string
                environment:
                  type: string
      responses:
        '200':
          description: ABAC evaluation result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
  /api/v1/access/deactivate-rule:
    post:
      summary: Deactivate an ABAC access policy rule
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: Deactivation result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid access policy administrator token
  /api/v1/audit/events:
    get:
      summary: List audit events with pagination, filters and integrity hashes
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: actor
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: target_type
          in: query
          required: false
          schema:
            type: string
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [info, warning, error, critical]
      responses:
        '200':
          description: Paginated audit event records
        '400':
          description: Validation error
        '401':
          description: Missing or invalid audit reader token
  /api/v1/audit/export:
    post:
      summary: Export audit events as JSON or JSONL
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id]
              properties:
                tenant_id:
                  type: string
                format:
                  type: string
                  enum: [json, jsonl]
                limit:
                  type: integer
                  minimum: 1
                  maximum: 500
                cursor:
                  type: string
                actor:
                  type: string
                action:
                  type: string
                target_type:
                  type: string
                severity:
                  type: string
                  enum: [info, warning, error, critical]
      responses:
        '200':
          description: Audit export bundle
        '400':
          description: Validation error
        '401':
          description: Missing or invalid audit reader token
  /api/v1/audit/integrity:
    get:
      summary: Verify the tenant audit trail hash chain
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10000
      responses:
        '200':
          description: Audit integrity report
        '400':
          description: Validation error
        '401':
          description: Missing or invalid audit reader token

  /api/v1/dcim/sites:
    get:
      summary: List DCIM sites
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: include_retired
          in: query
          required: false
          schema: {type: boolean}
      responses:
        '200': {description: DCIM sites}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM reader token}
  /api/v1/dcim/site:
    get:
      summary: Get a DCIM site
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: code
          in: query
          required: true
          schema: {type: string}
      responses:
        '200': {description: DCIM site}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM reader token}
  /api/v1/dcim/site/create:
    post:
      summary: Create a DCIM site
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, code, name, country, city]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                code: {type: string}
                name: {type: string}
                country: {type: string, minLength: 2, maxLength: 2}
                city: {type: string}
                region: {type: string}
      responses:
        '201': {description: DCIM site created}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM writer token}
  /api/v1/dcim/site/update:
    post:
      summary: Update a DCIM site
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, code]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                code: {type: string}
                name: {type: string}
                country: {type: string, minLength: 2, maxLength: 2}
                city: {type: string}
                region: {type: string}
                status:
                  type: string
                  enum: [active, suspended, retired]
      responses:
        '200': {description: DCIM site updated}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM writer token}
  /api/v1/dcim/site/delete:
    post:
      summary: Retire a DCIM site and its location dependencies
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, code]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                code: {type: string}
      responses:
        '200': {description: DCIM site retired}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM writer token}
  /api/v1/dcim/buildings:
    get:
      summary: List DCIM buildings for a site
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: site
          in: query
          required: true
          schema: {type: string}
        - name: include_retired
          in: query
          required: false
          schema: {type: boolean}
      responses:
        '200': {description: DCIM buildings}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM reader token}
  /api/v1/dcim/building:
    get:
      summary: Get a DCIM building
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: site
          in: query
          required: true
          schema: {type: string}
        - name: code
          in: query
          required: true
          schema: {type: string}
      responses:
        '200': {description: DCIM building}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM reader token}
  /api/v1/dcim/building/create:
    post:
      summary: Create a DCIM building under an active site
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, site, code, name]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                site: {type: string}
                code: {type: string}
                name: {type: string}
      responses:
        '201': {description: DCIM building created}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM writer token}
  /api/v1/dcim/building/update:
    post:
      summary: Update a DCIM building
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, site, code]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                site: {type: string}
                code: {type: string}
                name: {type: string}
                status:
                  type: string
                  enum: [active, suspended, retired]
      responses:
        '200': {description: DCIM building updated}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM writer token}
  /api/v1/dcim/building/delete:
    post:
      summary: Retire a DCIM building and its floor, room and zone dependencies
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, site, code]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                site: {type: string}
                code: {type: string}
      responses:
        '200': {description: DCIM building retired}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM writer token}
  /api/v1/dcim/floors:
    get:
      summary: List DCIM floors for a building
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: site
          in: query
          required: true
          schema: {type: string}
        - name: building
          in: query
          required: true
          schema: {type: string}
        - name: include_retired
          in: query
          required: false
          schema: {type: boolean}
      responses:
        '200': {description: DCIM floors}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM reader token}
  /api/v1/dcim/floor:
    get:
      summary: Get a DCIM floor
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: site
          in: query
          required: true
          schema: {type: string}
        - name: building
          in: query
          required: true
          schema: {type: string}
        - name: code
          in: query
          required: true
          schema: {type: string}
      responses:
        '200': {description: DCIM floor}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM reader token}
  /api/v1/dcim/floor/create:
    post:
      summary: Create a DCIM floor under an active building
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, site, building, code, name, level_index]
              properties:
                tenant_id: {type: string}
