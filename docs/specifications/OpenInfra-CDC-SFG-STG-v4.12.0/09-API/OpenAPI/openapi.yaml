                country: {type: string}
                region: {type: string}
                city: {type: string}
                building_code: {type: string}
                building_name: {type: string}
                floor_code:
                  type: string
                  deprecated: true
                  description: Legacy compatibility hint; OpenInfra generates the canonical floor code from floor_index.
                floor_name:
                  type: string
                  deprecated: true
                  description: Legacy compatibility hint; OpenInfra generates the floor label from floor_index.
                floor_index:
                  type: integer
                  minimum: -20
                  maximum: 150
                  description: Physical level used to generate L-01, L00, L01 and subsequent canonical floor codes.
                room_code: {type: string}
                room_name: {type: string}
                rows:
                  type: array
                  items: {type: string}
                columns:
                  type: array
                  items: {type: string}
                zone_code: {type: string}
                zone_name: {type: string}
                zone_rows:
                  type: array
                  items: {type: string}
                zone_columns:
                  type: array
                  items: {type: string}
                x: {type: number}
                y: {type: number}
                z: {type: number}
      responses:
        '201': {description: Physical room hierarchy persisted}
