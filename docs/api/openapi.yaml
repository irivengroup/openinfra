        - {name: application, in: query, required: true, schema: {type: string}}
        - {name: environment, in: query, required: true, schema: {type: string}}
      responses:
        '200': {description: Exposure context}
        '400': {description: Unknown or invalid exposure context}
        '401': {description: Missing or invalid SBOM reader token}
  /api/v1/sbom/exposures/upsert:
    post:
      operationId: upsertSbomExposureContext
      summary: Record exposure, business criticality and compensating controls
      security: [{bearerToken: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, application, environment, business_criticality]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                application: {type: string, maxLength: 128}
                environment: {type: string, maxLength: 64}
                internet_exposed: {type: boolean, default: false}
                flow_exposed: {type: boolean, default: false}
                business_criticality: {type: integer, minimum: 1, maximum: 5}
                compensating_controls: {type: array, maxItems: 100, items: {type: string}}
                asset_ids: {type: array, maxItems: 10000, items: {type: string}}
                service_ids: {type: array, maxItems: 10000, items: {type: string}}
      responses:
        '201': {description: Exposure context created or updated}
        '400': {description: Invalid exposure context}
        '401': {description: Missing or invalid SBOM writer token}
