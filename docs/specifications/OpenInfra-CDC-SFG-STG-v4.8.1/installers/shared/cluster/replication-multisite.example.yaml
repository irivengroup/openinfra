cluster_replication:
  enabled: true
  mode: local_quasi_sync
  synchronous_commit: remote_write
  synchronous_standby_policy: first_available_local_or_low_latency
  strict_remote_apply_enabled: false
  max_replication_lag_seconds: 5
  failover_automatic: true
  rejoin_automatic: true
  wal_archiving: true
  backups_required: true
  multisite:
    enabled_for_editions:
      - pro
      - enterprise
    pro_model: centralised_multisite
    enterprise_model: distributed_multisite_with_agents
