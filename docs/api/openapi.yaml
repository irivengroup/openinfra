        - {name: priority, in: query, schema: {type: string, enum: [low, medium, high, critical]}}
        - {name: status, in: query, schema: {type: string, enum: [open, accepted, mitigated, false-positive]}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 500, default: 100}}
        - {name: cursor, in: query, schema: {type: string}}
      responses:
        '200': {description: Paginated contextualized findings}
        '400': {description: Invalid filter or cursor}
        '401': {description: Missing or invalid SBOM reader token}
  /api/v1/sbom/risk/assess:
    post:
      operationId: assessSbomRisk
      summary: Correlate imported vulnerabilities with an SBOM and exposure context
      security: [{bearerToken: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, document_id]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                document_id: {type: string, format: uuid}
      responses:
        '201': {description: Contextualized risk assessment generated}
        '400': {description: Unknown SBOM or invalid vulnerability corpus}
        '401': {description: Missing or invalid SBOM executor token}
  /api/v1/sbom/risk/export:
    get:
      operationId: exportSbomRisk
