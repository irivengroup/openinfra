  blocking-security:
    name: Blocking push vulnerability gate / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install security dependencies
        run: |
          python -m pip install --upgrade "pip>=26.0"
          python -m pip install -e '.[postgresql]'
          python -m pip install --requirement requirements/dev.txt

      - name: Security gate - repository secrets and workflow hardening
        run: python scripts/security_gate.py --project-root .

      - name: Bandit SAST - application code
        run: bandit -q -r src/openinfra

      - name: Pip audit - known vulnerable dependencies
        run: python -m pip_audit --strict --requirement requirements/security-audit.txt --progress-spinner off

  codeql-security:
    name: CodeQL security analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
