  /api/v1/ipam/ddi-preview:
    post:
      summary: Preview DNS/DHCP DDI changes for an existing IPAM reservation
      description: Produces deterministic BIND, PowerDNS and Kea baseline changes, detected divergences and compensating rollback changes. 
        No external DDI system is contacted by this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, vrf, idempotency_key]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                vrf: {type: string}
                idempotency_key: {type: string}
                providers:
                  type: array
                  items: {type: string, enum: [all, bind, powerdns, kea]}
                dns_zone: {type: string, example: example.net}
                reverse_dns_zone: {type: string, example: 2.0.192.in-addr.arpa}
                mac_address: {type: string, example: aa:bb:cc:00:00:01}
                ttl: {type: integer, minimum: 0, maximum: 86400, default: 300}
                apply_preview: {type: boolean, default: false}
      responses:
        '200': {description: DDI dry-run plan with changes, divergences and rollback changes: null}
        '400': {description: Validation error or missing reservation}
      tags:
      - IPAM · Aperçu DDI
      x-openinfra-component: IPAM
      x-openinfra-context: Aperçu DDI
  /api/v1/ipam/ddi-sync:
    post:
      summary: Apply an IPAM reservation to configured DNS and DHCP providers
      description: Executes a durable idempotent DDI saga. Each provider mutation is journaled, exact previous state is captured before mutation, and completed effects are compensated in reverse order when a later operation fails. Ambiguous provider outcomes require explicit reconciliation and are never reported as successful.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, vrf, reservation_idempotency_key, execution_idempotency_key, providers]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                vrf: {type: string}
                reservation_idempotency_key: {type: string}
                execution_idempotency_key: {type: string}
                providers:
                  type: array
                  minItems: 1
                  uniqueItems: true
                  items: {type: string, enum: [bind, powerdns, kea]}
                dns_zone: {type: string, example: example.net}
                reverse_dns_zone: {type: string, example: 2.0.192.in-addr.arpa}
                mac_address: {type: string, example: aa:bb:cc:00:00:01}
                ttl: {type: integer, minimum: 0, maximum: 86400, default: 300}
                resume: {type: boolean, default: false}
      responses:
        '200': {description: Durable DDI execution journal, including receipts, compensation state and reconciliation requirement}
        '400': {description: Validation error, unsafe preview, unavailable provider or idempotency conflict}
        '401': {description: Missing or invalid authentication}
        '403': {description: Missing ipam.ddi.sync permission or tenant access}
      tags:
      - IPAM · Synchronisation DDI
      x-openinfra-component: IPAM
      x-openinfra-context: Synchronisation DDI
  /api/v1/exports/jobs:
