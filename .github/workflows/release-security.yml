name: OpenInfra Release Security

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  release-security:
    name: Release security certification
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install release security dependencies
        run: |
          python -m pip install --upgrade "pip>=26.0"
          python -m pip install -e '.[postgresql]'
          python -m pip install --requirement requirements/dev.txt
          npm ci --prefix web --ignore-scripts --no-audit --no-fund

      - name: Generate private runtime environment
        run: python scripts/docker_environment.py init

      - name: Build release image
        run: docker compose --env-file .env build api

      - name: Start live DAST topology
        run: |
          docker compose --env-file .env up -d postgres migrate auth-bootstrap api web
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:8080/ready >/dev/null \
              && curl --fail --silent http://127.0.0.1:2006/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose --env-file .env ps
          docker compose --env-file .env logs --tail=200 api web postgres migrate auth-bootstrap
          exit 1

      - name: Execute blocking release security audit
        id: security-audit
        continue-on-error: true
        run: |
          mkdir -p build/reports build/security-evidence
          python scripts/release_security_audit.py \
            --project-root . \
            --output build/reports/release-security.json \
            --evidence-dir build/security-evidence \
            --image-ref "openinfra/runtime:$(cat VERSION)" \
            --api-base-url http://127.0.0.1:8080 \
            --web-base-url http://127.0.0.1:2006 \
            --enforce

      - name: Collect runtime logs
        if: always()
        run: |
          mkdir -p build/security-evidence
          docker compose --env-file .env ps > build/security-evidence/compose-ps.log || true
          docker compose --env-file .env logs --no-color > build/security-evidence/compose.log || true

      - name: Upload immutable security evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: openinfra-release-security-${{ github.sha }}
          path: |
            build/reports/release-security.json
            build/security-evidence
          if-no-files-found: error
          retention-days: 90

      - name: Stop live DAST topology
        if: always()
        run: docker compose --env-file .env down --volumes --remove-orphans

      - name: Enforce release security result
        if: steps.security-audit.outcome != 'success'
        run: exit 1
