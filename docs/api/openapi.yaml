openapi: 3.1.0
info:
  title: OpenInfra API Foundation
  version: 0.12.0
components:
  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: OpenInfra API token
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: API is alive
  /ready:
    get:
      summary: Runtime readiness probe validating persistence and PostgreSQL schema state
      responses:
        '200':
          description: Backend is reachable and schema is ready
        '503':
          description: Backend or schema is not ready
  /api/v1/version:
    get:
      summary: Version
      responses:
        '200':
          description: Version payload
  /api/v1/database/schema:
    get:
      summary: PostgreSQL schema migration status
      responses:
        '200':
          description: Schema is up to date or JSON backend does not require migrations
        '409':
          description: PostgreSQL schema has pending migrations or checksum drift
  /api/v1/security/whoami:
    post:
      summary: Validate an API token and return the authenticated principal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, token]
              properties:
                tenant_id:
                  type: string
                token:
                  type: string
      responses:
        '200':
          description: Authenticated principal
        '400':
          description: Validation error
        '401':
          description: Invalid token

  /api/v1/security/tokens:
    get:
      summary: List API token metadata without returning token hashes or secrets
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated token metadata
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/security/revoke-token:
    post:
      summary: Revoke an API token using a security administrator token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, target_token]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                target_token:
                  type: string
                admin_token:
                  type: string
      responses:
        '200':
          description: Revocation result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/security/rotate-token:
    post:
      summary: Rotate a security administrator token and revoke the previous token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, current_token]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                current_token:
                  type: string
                subject:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
                token:
                  type: string
                ttl_seconds:
                  type: integer
                  minimum: 60
      responses:
        '201':
          description: Replacement token created
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/users:
    post:
      summary: Create or update an IAM user
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, username, display_name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                username:
                  type: string
                display_name:
                  type: string
                email:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: IAM user persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/groups:
    post:
      summary: Create or update an IAM group
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name, display_name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                name:
                  type: string
                display_name:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: IAM group persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/group-memberships:
    post:
      summary: Add a user to an IAM group
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, username, group_name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                username:
                  type: string
                group_name:
                  type: string
      responses:
        '201':
          description: IAM group membership persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/user-roles:
    post:
      summary: Grant a built-in role directly to a user
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, username, role]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                username:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: User role grant result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/group-roles:
    post:
      summary: Grant a built-in role to a group
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, group_name, role]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                group_name:
                  type: string
                role:
                  type: string
      responses:
        '200':
          description: Group role grant result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/identity/effective:
    get:
      summary: Return effective roles for an IAM subject
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: subject
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Effective identity roles
        '400':
          description: Validation error
        '401':
          description: Missing or invalid security administrator token
  /api/v1/access/rules:
    get:
      summary: List ABAC access policy rules
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated ABAC rules
        '400':
          description: Validation error
        '401':
          description: Missing or invalid access policy administrator token
    post:
      summary: Create or update an ABAC access policy rule
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name, permission, effect]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                name:
                  type: string
                permission:
                  type: string
                effect:
                  type: string
                  enum: [allow, deny]
                subjects:
                  type: array
                  items:
                    type: string
                roles:
                  type: array
                  items:
                    type: string
                site_codes:
                  type: array
                  items:
                    type: string
                environments:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: ABAC rule persisted
        '400':
          description: Validation error
        '401':
          description: Missing or invalid access policy administrator token
  /api/v1/access/evaluate:
    post:
      summary: Evaluate a Bearer token against a contextual ABAC request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, token, permission]
              properties:
                tenant_id:
                  type: string
                token:
                  type: string
                permission:
                  type: string
                site_code:
                  type: string
                environment:
                  type: string
      responses:
        '200':
          description: ABAC evaluation result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
  /api/v1/access/deactivate-rule:
    post:
      summary: Deactivate an ABAC access policy rule
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: Deactivation result
        '400':
          description: Validation error
        '401':
          description: Missing or invalid access policy administrator token
  /api/v1/audit/events:
    get:
      summary: List audit events with pagination, filters and integrity hashes
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: actor
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: target_type
          in: query
          required: false
          schema:
            type: string
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [info, warning, error, critical]
      responses:
        '200':
          description: Paginated audit event records
        '400':
          description: Validation error
        '401':
          description: Missing or invalid audit reader token
  /api/v1/audit/export:
    post:
      summary: Export audit events as JSON or JSONL
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id]
              properties:
                tenant_id:
                  type: string
                format:
                  type: string
                  enum: [json, jsonl]
                limit:
                  type: integer
                  minimum: 1
                  maximum: 500
                cursor:
                  type: string
                actor:
                  type: string
                action:
                  type: string
                target_type:
                  type: string
                severity:
                  type: string
                  enum: [info, warning, error, critical]
      responses:
        '200':
          description: Audit export bundle
        '400':
          description: Validation error
        '401':
          description: Missing or invalid audit reader token
  /api/v1/audit/integrity:
    get:
      summary: Verify the tenant audit trail hash chain
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10000
      responses:
        '200':
          description: Audit integrity report
        '400':
          description: Validation error
        '401':
          description: Missing or invalid audit reader token

  /api/v1/dcim/rooms:
    post:
      summary: Define a physical DCIM room hierarchy with floor, grid, optional zone and coordinates
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, site_code, site_name, country, city, building_code, building_name, floor_code, floor_name, floor_index, room_code, room_name, rows, columns]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                site_code: {type: string}
                site_name: {type: string}
                country: {type: string}
                region: {type: string}
                city: {type: string}
                building_code: {type: string}
                building_name: {type: string}
                floor_code: {type: string}
                floor_name: {type: string}
                floor_index: {type: integer}
                room_code: {type: string}
                room_name: {type: string}
                rows:
                  type: array
                  items: {type: string}
                columns:
                  type: array
                  items: {type: string}
                zone_code: {type: string}
                zone_name: {type: string}
                zone_rows:
                  type: array
                  items: {type: string}
                zone_columns:
                  type: array
                  items: {type: string}
                x: {type: number}
                y: {type: number}
                z: {type: number}
      responses:
        '201': {description: Physical room hierarchy persisted}
        '400': {description: Validation error}
        '401': {description: Missing or invalid DCIM operator token}
  /api/v1/ipam/allocate:
    post:
      summary: Allocate an IP address with idempotency
      description: Requires a Bearer token carrying ipam.allocate when API authentication is enabled.
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, vrf, prefix, hostname, idempotency_key]
              properties:
                tenant_id:
                  type: string
                actor:
                  type: string
                vrf:
                  type: string
                prefix:
                  type: string
                hostname:
                  type: string
                idempotency_key:
                  type: string
                site_code:
                  type: string
                environment:
                  type: string
      responses:
        '201':
          description: Address allocated
        '200':
          description: Existing idempotent allocation returned
        '400':
          description: Validation error
        '401':
          description: Missing or invalid Bearer token when authentication is enabled

  /api/v1/sot/objects:
    get:
      summary: Get or list Source of Truth objects
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: key
          in: query
          required: false
          schema: {type: string}
        - name: kind
          in: query
          required: false
          schema: {type: string, enum: [generic, device, interface, service, application]}
        - name: tag
          in: query
          required: false
          schema: {type: string}
        - name: limit
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 500}
        - name: cursor
          in: query
          required: false
          schema: {type: string}
      responses:
        '200': {description: Source of Truth object or paginated objects}
        '400': {description: Validation error}
        '401': {description: Missing or invalid SOT reader token}
    post:
      summary: Create or update a Source of Truth object with history
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, key, kind, display_name, source]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                key: {type: string}
                kind: {type: string, enum: [generic, device, interface, service, application]}
                display_name: {type: string}
                attributes: {type: object}
                tags:
                  type: array
                  items: {type: string}
                source: {type: string}
      responses:
        '201': {description: Source of Truth object persisted}
        '400': {description: Validation error}
        '401': {description: Missing or invalid SOT writer token}
  /api/v1/sot/object-versions:
    get:
      summary: Retrieve a historical Source of Truth object snapshot
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: key
          in: query
          required: true
          schema: {type: string}
        - name: version
          in: query
          required: true
          schema: {type: integer, minimum: 1}
      responses:
        '200': {description: Historical object snapshot}
        '400': {description: Validation error}
        '401': {description: Missing or invalid SOT reader token}
  /api/v1/sot/relations:
    get:
      summary: List Source of Truth typed relations
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: source_key
          in: query
          required: false
          schema: {type: string}
        - name: target_key
          in: query
          required: false
          schema: {type: string}
        - name: relation_type
          in: query
          required: false
          schema: {type: string}
        - name: limit
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 500}
        - name: cursor
          in: query
          required: false
          schema: {type: string}
      responses:
        '200': {description: Paginated typed relations}
        '400': {description: Validation error}
        '401': {description: Missing or invalid SOT reader token}
    post:
      summary: Create a typed Source of Truth relation
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, relation_type, source_key, target_key, provenance]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                relation_type: {type: string}
                source_key: {type: string}
                target_key: {type: string}
                provenance: {type: string}
      responses:
        '201': {description: Source of Truth relation persisted}
        '400': {description: Validation error}
        '401': {description: Missing or invalid SOT writer token}

  /api/v1/sot/governance-rules:
    get:
      summary: List Source of Truth governance rules
      security:
        - bearerToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: {type: string}
        - name: object_kind
          in: query
          required: false
          schema: {type: string, enum: [generic, device, interface, service, application]}
        - name: limit
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 500}
        - name: cursor
          in: query
          required: false
          schema: {type: string}
        - name: include_inactive
          in: query
          required: false
          schema: {type: boolean}
      responses:
        '200': {description: Paginated governance rules}
        '400': {description: Validation error}
        '401': {description: Missing or invalid SOT governance token}
    post:
      summary: Create or update a Source of Truth authoritative source rule
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name, attribute_path, authoritative_source]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                name: {type: string}
                object_kind: {type: string, enum: [generic, device, interface, service, application]}
                attribute_path: {type: string}
                authoritative_source: {type: string}
                priority: {type: integer}
                freshness_seconds: {type: integer}
                conflict_strategy: {type: string, enum: [reject, accept_with_audit]}
      responses:
        '201': {description: Governance rule persisted}
        '400': {description: Validation error}
        '401': {description: Missing or invalid SOT governance token}
  /api/v1/sot/governance/evaluate:
    post:
      summary: Evaluate a Source of Truth update against authoritative source rules
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, object_kind, incoming_source, existing_attributes, incoming_attributes]
              properties:
                tenant_id: {type: string}
                object_kind: {type: string}
                incoming_source: {type: string}
                existing_attributes: {type: object}
                incoming_attributes: {type: object}
      responses:
        '200': {description: Governance evaluation result}
        '400': {description: Validation error}
        '401': {description: Missing or invalid SOT governance token}
  /api/v1/sot/governance/deactivate-rule:
    post:
      summary: Deactivate a Source of Truth governance rule
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, name]
              properties:
                tenant_id: {type: string}
                actor: {type: string}
                name: {type: string}
      responses:
        '200': {description: Governance rule deactivated}
        '400': {description: Validation error}
        '401': {description: Missing or invalid SOT governance token}

