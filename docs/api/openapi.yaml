                room_name: {type: string}
                rows:
                  type: array
                  items: {type: string}
                columns:
                  type: array
                  items: {type: string}
                zone_code: {type: string}
                zone_name: {type: string}
                zone_rows:
                  type: array
                  items: {type: string}
