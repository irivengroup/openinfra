          application/json:
            schema:
              type: object
              required: [tenant_id, collector_id, certificate_fingerprint, job_id, worker_id, lease_token, error]
              properties:
                tenant_id: {type: string}
                collector_id: {type: string, format: uuid}
                certificate_fingerprint: {type: string}
                job_id: {type: string, format: uuid}
                worker_id: {type: string}
                lease_token: {type: integer, minimum: 1}
                error: {type: string, minLength: 1, maxLength: 1024}
                retry_delay_seconds: {type: integer, minimum: 0, maximum: 86400, default: 30}
      responses:
        '200': {description: Job in retry-wait or dead-letter state}
        '400': {description: Stale token or validation error}
        '401': {description: Collector certificate identity rejected}
