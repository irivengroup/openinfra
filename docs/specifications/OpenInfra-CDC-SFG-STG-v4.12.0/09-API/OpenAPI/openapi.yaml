      description: Accepts up to 10000 normalized provider, SaaS, datacenter, energy, licence, support or contract records. Sensitive 
        metadata keys are rejected recursively.
      security: [bearerToken: []]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, idempotency_key, source, records]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                idempotency_key: {type: string, minLength: 8, maxLength: 192}
                source: {type: string, maxLength: 128}
                records:
                  type: array
                  minItems: 1
                  maxItems: 10000
                  items:
                    type: object
                    required: [category, period_start, period_end, currency, amount]
                    properties:
                      external_id: {type: string}
                      idempotency_key: {type: string, minLength: 8, maxLength: 192}
                      category: {type: string, enum: [cloud, saas, datacenter, energy, license, support, contract]}
                      source: {type: string}
                      period_start: {type: string, format: date}
                      period_end: {type: string, format: date}
                      currency: {type: string, pattern: '^[A-Z]{3}$'}
                      amount: {type: string, pattern: '^[0-9]+(?:\.[0-9]{1,6})?$'}
                      owner: {type: string}
                      allocation_method: {type: string}
                      metadata: {type: object, additionalProperties: true}
                    additionalProperties: true
      responses:
        '202': {description: Import job queued or idempotently reused}
        '400': {description: Invalid import payload, duplicate key mismatch or sensitive metadata: null}
        '401': {description: Missing or invalid FinOps import token}
      tags:
      - FinOps · Ingestion des coûts
      x-openinfra-component: FinOps
      x-openinfra-context: Ingestion des coûts
