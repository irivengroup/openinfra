      summary: Traverse the tenant RSOT dependency graph
      description: Performs a breadth-first, cycle-safe and bounded traversal over time-aware RSOT relations without duplicating the source 
        of truth.
      security:
      - bearerToken: []
      parameters:
      - {name: tenant_id, in: query, required: true, schema: {type: string}}
      - {name: root_key, in: query, required: true, schema: {type: string}}
      - {name: direction, in: query, required: false, schema: {type: string, enum: [outgoing, incoming, both], default: both}}
      - {name: max_depth, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 12, default: 3}}
      - {name: max_nodes, in: query, required: false, schema: {type: integer, minimum: 2, maximum: 5000, default: 500}}
      - {name: relation_type, in: query, required: false, schema: {type: array, items: {type: string}}, style: form, explode: true}
      - {name: as_of, in: query, required: false, schema: {type: string, format: date-time}}
      responses:
        '200': {description: Bounded dependency graph projection}
        '400': {description: Invalid graph constraints or query}
        '401': {description: Missing or invalid Bearer token}
      tags:
      - RSOT · Relations et dépendances
      x-openinfra-component: RSOT
      x-openinfra-context: Relations et dépendances
