            text/csv:
              schema: {type: string, format: binary}
            application/graphml+xml:
              schema: {type: string, format: binary}
        '400': {description: Invalid graph constraints, filters or export format: null}
        '401': {description: Missing or invalid Bearer token}
      tags:
      - RSOT · Relations et dépendances
      x-openinfra-component: RSOT
      x-openinfra-context: Relations et dépendances

