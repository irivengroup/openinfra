      security: [{bearerToken: []}]
      parameters:
        - {name: tenant_id, in: query, required: true, schema: {type: string}}
        - {name: status, in: query, schema: {type: string, enum: [draft, queued, running, completed, failed, cancelled]}}
        - {name: site, in: query, schema: {type: string}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 500, default: 100}}
        - {name: cursor, in: query, schema: {type: string}}
      responses:
        '200': {description: Paginated simulation scenarios}
        '400': {description: Invalid filter or cursor}
        '401': {description: Missing or invalid simulation reader token}
