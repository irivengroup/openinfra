  /api/v1/imports/async-bulk-datasets:
    post:
      operationId: submitAsyncBulkImport
      summary: Stream a CSV or XLSX dataset and queue a restartable bulk import
      description: >-
        Streams the raw request body into the tenant-isolated content-addressed artifact store,
        then submits an idempotent imports.bulk-dataset job. CSV uploads are limited to 512 MiB;
        XLSX uploads are limited to 50 MiB and undergo archive and XML decompression safeguards.
        Processing occurs in the imports worker so interactive API requests remain available.
      security: [bearerToken: []]
      parameters:
      - {name: tenant_id, in: query, required: true, schema: {type: string}}
      - {name: actor, in: query, required: false, schema: {type: string, default: api}}
      - {name: format, in: query, required: true, schema: {type: string, enum: [csv, xlsx]}}
      - {name: mapping_json, in: query, required: true, schema: {type: string}, description: JSON object mapping target fields to source columns or literal values}
      - {name: apply, in: query, required: false, schema: {type: boolean, default: false}}
      - {name: idempotency_key, in: query, required: true, schema: {type: string, minLength: 8, maxLength: 128}}
      - {name: batch_size, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 100000, default: 5000}}
      - {name: checkpoint_interval, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 1000000, default: 25000}}
      - {name: sample_limit, in: query, required: false, schema: {type: integer, minimum: 0, maximum: 10000, default: 100}}
      - {name: max_attempts, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 20, default: 3}}
      - {name: resume_job_id, in: query, required: false, schema: {type: string, format: uuid}}
      - {name: X-OpenInfra-Filename, in: header, required: true, schema: {type: string, maxLength: 255}, description: URL-encoded source filename ending in .csv or .xlsx}
      requestBody:
        required: true
        content:
          text/csv:
            schema: {type: string, format: binary}
          application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
            schema: {type: string, format: binary}
      responses:
        '202': {description: Artifact stored and idempotent asynchronous import job queued}
        '400': {description: Invalid metadata, mapping, filename, format, size or truncated upload}
        '401': {description: Async submit permission required}
      tags:
      - Import et export · Imports
      x-openinfra-component: Import et export
      x-openinfra-context: Imports
