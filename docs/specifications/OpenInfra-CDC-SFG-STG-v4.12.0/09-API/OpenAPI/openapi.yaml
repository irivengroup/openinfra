  /api/v1/kubernetes/gitops-states/import:
    post:
      operationId: importKubernetesGitOpsState
      summary: Import an immutable Kubernetes GitOps expected-state snapshot
      description: Validates a full immutable Git revision, governed resources and policy, deduplicates by canonical fingerprint and records an audited desired-state snapshot. Secret material is forbidden and no cluster mutation is performed.
      security:
      - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, cluster_key, repository_ref, revision, source_path, owner, environment, captured_at, policy, resources]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                cluster_key: {type: string}
                repository_ref: {type: string, maxLength: 1024}
                revision: {type: string, pattern: '^(?:[a-fA-F0-9]{40}|[a-fA-F0-9]{64})$'}
                source_path: {type: string, maxLength: 512}
                owner: {type: string}
                environment: {type: string}
                captured_at: {type: string, format: date-time}
                policy:
                  type: object
                  description: Governed label, annotation, owner and environment policy.
                  additionalProperties: true
                resources:
                  type: array
                  minItems: 1
                  maxItems: 50000
                  items:
                    type: object
                    required: [kind, name]
                    additionalProperties: true
      responses:
        '201': {description: Imported or idempotently reused immutable GitOps expected state}
        '400': {description: Invalid GitOps source, policy or resource definition}
        '401': {description: Missing or invalid bearer token}
      tags:
      - Discovery · Kubernetes et cloud-native
      x-openinfra-component: Discovery
      x-openinfra-context: Kubernetes et cloud-native
  /api/v1/kubernetes/topologies/import:
    post:
      summary: Import an immutable Kubernetes inventory snapshot
      description: Validates referential integrity, rejects secret material, normalizes approved secret references into masked/hash-only representations, deduplicates by canonical fingerprint and records an audited immutable snapshot.
      security:
      - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, cluster_key, cluster_name, provider, kubernetes_version, source_ref, observed_at, resources]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                cluster_key: {type: string}
                cluster_name: {type: string}
                provider: {type: string}
                kubernetes_version: {type: string}
                region: {type: string}
                site_code: {type: string}
                source_ref: {type: string}
                observed_at: {type: string, format: date-time}
                resources:
                  type: array
                  minItems: 1
                  maxItems: 50000
                  items:
                    type: object
                    required: [kind, uid, name]
                    additionalProperties: true
      responses:
        '201': {description: Imported or idempotently reused immutable topology snapshot}
        '400': {description: Invalid topology or broken Kubernetes reference}
        '401': {description: Missing or invalid bearer token}
      tags:
      - Discovery · Kubernetes et cloud-native
      x-openinfra-component: Discovery
      x-openinfra-context: Kubernetes et cloud-native
