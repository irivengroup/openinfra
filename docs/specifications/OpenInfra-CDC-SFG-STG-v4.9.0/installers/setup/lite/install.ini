[storage]
vgname = datavg
lvname = openinfradata_lv
lvsize = 2GB

[security]
transport = local
tls_min_version = TLSv1.3
mtls_required = false
loopback_only = true


[web_database]
postgresql_dsn_ref = env:OPENINFRA_LITE_WEB_POSTGRES_DSN
postgresql_user_ref = env:OPENINFRA_LITE_WEB_POSTGRES_USER
postgresql_password_ref = env:OPENINFRA_LITE_WEB_POSTGRES_PASSWORD
