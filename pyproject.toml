[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "openinfra"
version = "0.17.0"
description = "OpenInfra Python POO source of truth, DCIM and IPAM foundation"
readme = "README.md"
requires-python = ">=3.11"
license = "AGPL-3.0-or-later"
authors = [{ name = "OpenInfra Project" }]
keywords = ["dcim", "itam", "ipam", "source-of-truth", "postgresql", "openinfra"]
dependencies = []

[project.optional-dependencies]
postgresql = ["psycopg[binary]>=3.2"]
dev = [
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "ruff>=0.5",
  "mypy>=1.10",
  "bandit>=1.7",
  "build>=1.2",
]

[project.scripts]
openinfra = "openinfra.interfaces.cli:OpenInfraCLI.main"
openinfra-api = "openinfra.interfaces.http_api:OpenInfraApiEntrypoint.main"

[tool.hatch.build.targets.wheel]
packages = ["src/openinfra"]

[tool.pytest.ini_options]
addopts = "-q --cov=src/openinfra --cov-report=term-missing --cov-fail-under=98"
testpaths = ["tests"]
python_classes = ["Test*"]
python_files = ["test_*.py"]

[tool.coverage.run]
branch = false
source = ["src/openinfra"]
omit = ["src/openinfra/infrastructure/postgresql.py"]

[tool.coverage.report]
show_missing = true
skip_covered = true
exclude_lines = ['if TYPE_CHECKING:', 'raise TypeError\("adapter contract invoked directly"\)']

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src", "tests", "scripts"]

[tool.ruff.lint]
select = ["A", "ARG", "B", "C4", "E", "F", "I", "N", "PL", "PTH", "RUF", "S", "SIM", "T20", "UP", "W"]
ignore = ["PLR0913"]

[tool.ruff.lint.per-file-ignores]
"src/openinfra/interfaces/cli.py" = ["T201"]
"tests/**/*.py" = ["S101", "PLR2004"]
"scripts/**/*.py" = ["PTH", "S404", "S603", "S607", "T201"]
"docker/**/*.py" = ["S310", "S404", "S603", "S607", "T201"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
mypy_path = "src"
packages = ["openinfra"]

[tool.bandit]
skips = ["B101"]
exclude_dirs = ["tests"]
