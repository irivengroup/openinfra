[api]
backend_endpoint = https://enterprise-vip.openinfra.example.com
enrollment_token_ref = env:OPENINFRA_AGENT_ENROLLMENT_TOKEN

[security]
transport = mtls
tls_min_version = TLSv1.3
mtls_required = true
server_ca_cert_ref = file:///opt/openinfra/config/trust/openinfra-ca.pem
client_cert_ref = file:///opt/openinfra/config/tls/enterprise-agent.crt
client_key_ref = file:///opt/openinfra/config/tls/enterprise-agent.key
trusted_proxy_cidrs =
loopback_only = false
