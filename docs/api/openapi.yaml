                source_ref: {type: string}
                scope: {type: string}
                external_id: {type: string}
                confidence: {type: number, minimum: 0, maximum: 1}
                observed_at: {type: string, format: date-time, nullable: true}
                payload: {type: object, additionalProperties: true}
      responses:
        '201': {description: Immutable discovery evidence stored}
        '400': {description: Validation or secret-material rejection}
        '401': {description: RSOT governance write permission required}
