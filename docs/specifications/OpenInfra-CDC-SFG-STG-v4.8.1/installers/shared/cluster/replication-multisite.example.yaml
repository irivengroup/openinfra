cluster_replication:
  enabled: true
  mode: near_real_time_streaming
  commit_policy: local_commit_non_blocking
  standby_policy: first_available_local_or_low_latency
  strict_local_enabled: false
  max_replication_lag_seconds: 5
  failover_automatic: true
  rejoin_automatic: true
  wal_archiving: true
  backups_required: true
  multisite:
    enabled_for_editions:
      - pro
      - enterprise
    pro_model: centralised_multisite
    enterprise_model: distributed_multisite_with_agents
