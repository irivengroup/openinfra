name: OpenInfra CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  quality:
    name: Quality / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[postgresql,dev]'

      - name: Format check
        run: ruff format --check src tests scripts docker

      - name: Lint
        run: ruff check src tests scripts docker

      - name: Type check
        run: mypy src/openinfra

      - name: Unit and integration tests with coverage
        run: python -m pytest

      - name: Compile check
        run: python -m compileall -q src tests scripts docker

      - name: Security scan - Bandit SAST
        run: bandit -q -r src/openinfra

      - name: Security gate - secrets and CI hardening
        run: python scripts/security_gate.py --project-root .

      - name: Build package
        run: python -m build

      - name: Verify artifact
        run: python scripts/verify_artifact.py dist/*.whl

      - name: Smoke CLI version
        run: openinfra version

      - name: Smoke specification validation
        run: openinfra spec validate --root docs/specifications/OpenInfra-CDC-SFG-STG-v4

      - name: Smoke migration rendering
        run: |
          openinfra database render-migration --name 0001_bootstrap --root migrations/postgresql >/tmp/openinfra-0001.sql
          openinfra database render-migration --name 0002_security_rbac --root migrations/postgresql >/tmp/openinfra-0002.sql
          openinfra database render-migration --name 0003_security_token_lifecycle --root migrations/postgresql >/tmp/openinfra-0003.sql
          openinfra database render-migration --name 0004_identity_users_groups --root migrations/postgresql >/tmp/openinfra-0004.sql
          openinfra database render-migration --name 0005_access_policy_abac --root migrations/postgresql >/tmp/openinfra-0005.sql
          openinfra database render-migration --name 0006_audit_trail_integrity --root migrations/postgresql >/tmp/openinfra-0006.sql
          openinfra database render-migration --name 0007_source_of_truth_core --root migrations/postgresql >/tmp/openinfra-0007.sql
          openinfra database render-migration --name 0008_source_governance --root migrations/postgresql >/tmp/openinfra-0008.sql
          openinfra database render-migration --name 0009_dcim_physical_model --root migrations/postgresql >/tmp/openinfra-0009.sql
          openinfra database render-migration --name 0010_dcim_rack_capacity --root migrations/postgresql >/tmp/openinfra-0010.sql
          openinfra database render-migration --name 0011_dcim_field_operations --root migrations/postgresql >/tmp/openinfra-0011.sql
          openinfra database render-migration --name 0012_dcim_visualization_indexes --root migrations/postgresql >/tmp/openinfra-0012.sql
          openinfra database render-migration --name 0013_dcim_cabling_foundation --root migrations/postgresql >/tmp/openinfra-0013.sql
          openinfra database render-migration --name 0014_dcim_energy_cooling_foundation --root migrations/postgresql >/tmp/openinfra-0014.sql

      - name: Smoke JSON IPAM allocation
        run: |
          tmpdir="$(mktemp -d)"
          openinfra ipam allocate \
            --data "$tmpdir/state.json" \
            --tenant default \
            --vrf default \
            --prefix 10.250.0.0/30 \
            --hostname ci-smoke \
            --idempotency-key ci-smoke-1

      - name: Smoke JSON security token
        run: |
          tmpdir="$(mktemp -d)"
          operator_token="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          security_admin_token="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          worker_token="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          openinfra security bootstrap-token \
            --data "$tmpdir/state.json" \
            --tenant default \
            --subject ci-client \
            --role ipam:operator \
            --token "$operator_token"
          openinfra security whoami \
            --data "$tmpdir/state.json" \
            --tenant default \
            --token "$operator_token"
          openinfra security bootstrap-token \
            --data "$tmpdir/state.json" \
            --tenant default \
            --subject ci-security-admin \
            --role security:admin \
            --token "$security_admin_token"
          openinfra security bootstrap-token \
            --data "$tmpdir/state.json" \
            --tenant default \
            --subject ci-viewer \
            --role viewer \
            --token "$worker_token"
          openinfra security list-tokens \
            --data "$tmpdir/state.json" \
            --tenant default \
            --admin-token "$security_admin_token"
          openinfra security revoke-token \
            --data "$tmpdir/state.json" \
            --tenant default \
            --target-token "$worker_token" \
            --admin-token "$security_admin_token"

      - name: Smoke JSON identity lifecycle
        run: |
          tmpdir="$(mktemp -d)"
          admin_token="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          openinfra security bootstrap-token \
            --data "$tmpdir/state.json" \
            --tenant default \
            --subject ci-identity-admin \
            --role admin \
            --token "$admin_token"
          openinfra identity create-user \
            --data "$tmpdir/state.json" \
            --tenant default \
            --admin-token "$admin_token" \
            --username ci-user \
            --display-name "CI User" \
            --role viewer
          openinfra identity create-group \
            --data "$tmpdir/state.json" \
            --tenant default \
            --admin-token "$admin_token" \
            --name ci-ipam \
            --display-name "CI IPAM" \
            --role ipam:operator
          openinfra identity add-user-to-group \
            --data "$tmpdir/state.json" \
            --tenant default \
            --admin-token "$admin_token" \
            --username ci-user \
            --group ci-ipam
          openinfra identity effective \
            --data "$tmpdir/state.json" \
            --tenant default \
            --admin-token "$admin_token" \
            --subject ci-user

      - name: Smoke JSON access policy lifecycle
        run: |
          tmpdir="$(mktemp -d)"
          admin_token="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          worker_token="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          openinfra security bootstrap-token \
            --data "$tmpdir/state.json" \
            --tenant default \
            --subject ci-access-admin \
            --role admin \
            --token "$admin_token"
          openinfra security bootstrap-token \
            --data "$tmpdir/state.json" \
            --tenant default \
            --subject ci-access-worker \
            --role ipam:operator \
            --token "$worker_token"
          openinfra access create-rule \
            --data "$tmpdir/state.json" \
            --tenant default \
            --admin-token "$admin_token" \
            --name ci-worker-par1 \
            --permission ipam.allocate \
            --effect allow \
            --subject ci-access-worker \
            --site-code PAR1 \
            --environment prod
          openinfra access list-rules \
            --data "$tmpdir/state.json" \
            --tenant default \
            --admin-token "$admin_token"
          openinfra access evaluate \
            --data "$tmpdir/state.json" \
            --tenant default \
            --token "$worker_token" \
            --permission ipam.allocate \
            --site-code PAR1 \
            --environment prod
          openinfra ipam allocate \
            --data "$tmpdir/state.json" \
            --tenant default \
            --auth-token "$worker_token" \
            --site-code PAR1 \
            --environment prod \
            --vrf default \
            --prefix 10.252.0.0/30 \
            --hostname ci-abac-smoke \
            --idempotency-key ci-abac-smoke-1

      - name: Smoke JSON audit trail
        run: |
          tmpdir="$(mktemp -d)"
          admin_token="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          openinfra security bootstrap-token \
            --data "$tmpdir/state.json" \
            --tenant default \
            --subject ci-audit-admin \
            --role admin \
            --token "$admin_token"
          openinfra ipam allocate \
            --data "$tmpdir/state.json" \
            --tenant default \
            --vrf default \
            --prefix 10.253.0.0/30 \
            --hostname ci-audit-smoke \
            --idempotency-key ci-audit-smoke-1
          openinfra audit list \
            --data "$tmpdir/state.json" \
            --tenant default \
            --admin-token "$admin_token"
          openinfra audit export \
            --data "$tmpdir/state.json" \
            --tenant default \
            --admin-token "$admin_token" \
            --format jsonl
          openinfra audit verify-integrity \
            --data "$tmpdir/state.json" \
            --tenant default \
            --admin-token "$admin_token"

      - name: Smoke JSON Source of Truth governance
        run: |
          tmpdir="$(mktemp -d)"
          admin_token="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          openinfra security bootstrap-token \
            --data "$tmpdir/state.json" \
            --tenant default \
            --subject ci-sot-governance \
            --role sot:governance-admin \
            --token "$admin_token"
          openinfra sot create-governance-rule \
            --data "$tmpdir/state.json" \
            --tenant default \
            --admin-token "$admin_token" \
            --name ci-serial-authority \
            --object-kind device \
            --attribute-path serial \
            --authoritative-source discovery \
            --priority 500
          openinfra sot list-governance-rules \
            --data "$tmpdir/state.json" \
            --tenant default \
            --admin-token "$admin_token" \
            --object-kind device
          openinfra sot evaluate-governance \
            --data "$tmpdir/state.json" \
            --tenant default \
            --admin-token "$admin_token" \
            --object-kind device \
            --incoming-source manual \
            --existing-attributes-json '{"serial":"A"}' \
            --incoming-attributes-json '{"serial":"B"}'
          openinfra sot deactivate-governance-rule \
            --data "$tmpdir/state.json" \
            --tenant default \
            --admin-token "$admin_token" \
            --name ci-serial-authority

      - name: Smoke JSON DCIM physical model
        run: |
          tmpdir="$(mktemp -d)"
          openinfra dcim define-room \
            --data "$tmpdir/state.json" \
            --tenant default \
            --site-code CI1 \
            --site-name "CI Datacenter" \
            --country FR \
            --region IDF \
            --city Paris \
            --building-code BAT-CI \
            --building-name "CI Building" \
            --floor-code F01 \
            --floor-name "First Floor" \
            --floor-index 1 \
            --room-code MMR-CI \
            --room-name "CI Room" \
            --row A \
            --column 01 \
            --zone-code Z1 \
            --zone-name "Critical Zone" \
            --zone-row A \
            --zone-column 01
          openinfra dcim locate \
            --data "$tmpdir/state.json" \
            --tenant default \
            --asset-tag CI-SRV-DCIM-01 \
            --equipment-name "CI Server" \
            --site CI1 \
            --building BAT-CI \
            --floor F01 \
            --room MMR-CI \
            --zone Z1 \
            --row A \
            --column 01 \
            --x 1 \
            --y 2 \
            --z 0

      - name: Smoke JSON DCIM field operations
        run: |
          tmpdir="$(mktemp -d)"
          openinfra dcim locate \
            --data "$tmpdir/state.json" \
            --tenant default \
            --asset-tag CI-SRV-QR-01 \
            --equipment-name "CI QR Server" \
            --site PAR1 \
            --building BAT-A \
            --floor F01 \
            --room MMR1 \
            --row A \
            --column 01
          openinfra dcim locator-sheet \
            --data "$tmpdir/state.json" \
            --tenant default \
            --asset-tag CI-SRV-QR-01 \
            --format json > "$tmpdir/sheet.json"
          payload="$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["locator"]["payload"])' "$tmpdir/sheet.json")"
          openinfra dcim verify-scan \
            --data "$tmpdir/state.json" \
            --tenant default \
            --asset-tag CI-SRV-QR-01 \
            --payload "$payload"
          openinfra dcim define-rack \
            --data "$tmpdir/state.json" \
            --tenant default \
            --site PAR1 \
            --building BAT-A \
            --floor F01 \
            --room MMR1 \
            --rack R01 \
            --row A \
            --column 01 \
            --units 8 \
            --face front \
            --face rear
          openinfra dcim locate \
            --data "$tmpdir/state.json" \
            --tenant default \
            --asset-tag CI-SRV-VIZ-01 \
            --equipment-name "CI Visualization Server" \
            --site PAR1 \
            --building BAT-A \
            --floor F01 \
            --room MMR1 \
            --row A \
            --column 01 \
            --rack R01 \
            --u-position 2 \
            --u-height 2 \
            --rack-face front
          openinfra dcim room-plan \
            --data "$tmpdir/state.json" \
            --tenant default \
            --site PAR1 \
            --building BAT-A \
            --room MMR1 \
            --format json > "$tmpdir/room-plan.json"
          openinfra dcim room-plan \
            --data "$tmpdir/state.json" \
            --tenant default \
            --site PAR1 \
            --building BAT-A \
            --room MMR1 \
            --format svg > "$tmpdir/room-plan.svg"
          openinfra dcim rack-elevation \
            --data "$tmpdir/state.json" \
            --tenant default \
            --site PAR1 \
            --building BAT-A \
            --room MMR1 \
            --rack R01 \
            --face front \
            --format json > "$tmpdir/rack-elevation.json"
          openinfra dcim rack-elevation \
            --data "$tmpdir/state.json" \
            --tenant default \
            --site PAR1 \
            --building BAT-A \
            --room MMR1 \
            --rack R01 \
            --face front \
            --format html > "$tmpdir/rack-elevation.html"
          python - "$tmpdir/room-plan.json" "$tmpdir/rack-elevation.json" <<'PYSMOKE'
          import json
          import sys
          room_plan = json.load(open(sys.argv[1], encoding="utf-8"))
          rack_elevation = json.load(open(sys.argv[2], encoding="utf-8"))
          assert room_plan["type"] == "room_plan_2d"
          assert rack_elevation["type"] == "rack_elevation"
          assert rack_elevation["used_units"] == [2, 3]
          PYSMOKE

      - name: Smoke JSON DCIM cabling and energy foundation
        run: |
          tmpdir="$(mktemp -d)"
          openinfra dcim define-room \
            --data "$tmpdir/state.json" \
            --tenant default \
            --site-code CBL-CI \
            --site-name "CI Cabling Datacenter" \
            --country FR \
            --city Paris \
            --building-code BAT-CBL \
            --building-name "CI Cabling Building" \
            --floor-code F01 \
            --floor-name "First Floor" \
            --floor-index 1 \
            --room-code MMR-CBL \
            --room-name "CI Cabling Room" \
            --row A \
            --column 01 \
            --zone-code Z1 \
            --zone-name "CI Energy Zone" \
            --zone-row A \
            --zone-column 01
          openinfra dcim define-rack \
            --data "$tmpdir/state.json" \
            --tenant default \
            --site CBL-CI \
            --building BAT-CBL \
            --floor F01 \
            --room MMR-CBL \
            --zone Z1 \
            --rack R01 \
            --row A \
            --column 01 \
            --units 12 \
            --face front
          openinfra dcim locate \
            --data "$tmpdir/state.json" \
            --tenant default \
            --asset-tag CI-SRV-CABLE-01 \
            --equipment-name "CI Cabled Server" \
            --site CBL-CI \
            --building BAT-CBL \
            --floor F01 \
            --room MMR-CBL \
            --zone Z1 \
            --row A \
            --column 01 \
            --rack R01 \
            --u-position 6 \
            --rack-face front
          openinfra dcim define-patch-panel \
            --data "$tmpdir/state.json" \
            --tenant default \
            --site CBL-CI \
            --building BAT-CBL \
            --room MMR-CBL \
            --rack R01 \
            --patch-panel PP01 \
            --rack-face front \
            --u-position 2 \
            --port-count 2 \
            --connector rj45 \
            --medium copper
          openinfra dcim define-port \
            --data "$tmpdir/state.json" \
            --tenant default \
            --owner-type equipment \
            --owner-code CI-SRV-CABLE-01 \
            --port-name ETH0 \
            --connector rj45 \
            --medium copper
          openinfra dcim connect-cable \
            --data "$tmpdir/state.json" \
            --tenant default \
            --cable-id CAB-CI-001 \
            --a-owner-type equipment \
            --a-owner-code CI-SRV-CABLE-01 \
            --a-port-name ETH0 \
            --b-owner-type patch_panel \
            --b-owner-code PP01 \
            --b-port-name P01 \
            --medium copper \
            --path "Rack R01 front vertical manager" \
            --path "Patch panel PP01 port P01" > "$tmpdir/cable.json"
          openinfra dcim cable-trace \
            --data "$tmpdir/state.json" \
            --tenant default \
            --cable-id CAB-CI-001 > "$tmpdir/trace.json"
          python - "$tmpdir/trace.json" <<'PYSMOKE'
          import json
          import sys
          trace = json.load(open(sys.argv[1], encoding="utf-8"))
          assert trace["cable_id"] == "CAB-CI-001"
          assert trace["a_port"]["owner_type"] == "equipment"
          assert trace["b_port"]["owner_code"] == "PP01"
          PYSMOKE
          openinfra dcim define-power-device \
            --data "$tmpdir/state.json" \
            --tenant default \
            --code PDU-A \
            --kind pdu \
            --site CBL-CI \
            --building BAT-CBL \
            --room MMR-CBL \
            --rack R01 \
            --side A \
            --capacity-watts 8000 \
            --derating-percent 80 \
            --input-source UPS-A \
            --output-voltage 230
          openinfra dcim define-power-circuit \
            --data "$tmpdir/state.json" \
            --tenant default \
            --circuit-id CIR-A-01 \
            --source-device PDU-A \
            --site CBL-CI \
            --building BAT-CBL \
            --room MMR-CBL \
            --rack R01 \
            --side A \
            --capacity-watts 3000 \
            --breaker-rating-amps 16
          openinfra dcim define-cooling-zone \
            --data "$tmpdir/state.json" \
            --tenant default \
            --site CBL-CI \
            --building BAT-CBL \
            --room MMR-CBL \
            --zone Z1 \
            --role cold_aisle \
            --cooling-capacity-watts 6000 \
            --supply-temperature-c 18 \
            --return-temperature-c 30
          openinfra dcim reserve-power \
            --data "$tmpdir/state.json" \
            --tenant default \
            --asset-tag CI-SRV-CABLE-01 \
            --circuit-id CIR-A-01 \
            --expected-watts 1200
          openinfra dcim energy-cooling-capacity \
            --data "$tmpdir/state.json" \
            --tenant default \
            --site CBL-CI \
            --building BAT-CBL \
            --room MMR-CBL \
            --rack R01 > "$tmpdir/energy.json"
          python - "$tmpdir/energy.json" <<'PYENERGY'
          import json
          import sys
          report = json.load(open(sys.argv[1], encoding="utf-8"))
          assert report["rack"] == "R01"
          assert report["sides"]["A"]["reserved_watts"] == 1200
          assert report["cooling"]["remaining_watts"] == 4800
          PYENERGY

      - name: Native runtime asset smoke
        run: python scripts/native_runtime_smoke.py --project-root .

      - name: Internal quality gate
        run: python scripts/quality_gate.py

  blocking-security:
    name: Blocking security checks / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install security dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[postgresql,dev]'

      - name: Security gate - repository secrets and workflow hardening
        run: python scripts/security_gate.py --project-root .

      - name: Bandit SAST - application code
        run: bandit -q -r src/openinfra

      - name: Pip audit - known vulnerable dependencies
        run: python -m pip_audit --strict --skip-editable --progress-spinner off

  dependency-review:
    name: Dependency review / PR vulnerability gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate

  codeql-security:
    name: CodeQL security analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
