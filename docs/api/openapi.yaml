                collector_id: {type: string, format: uuid}
                requested_scope: {type: string}
                job_type: {type: string}
                target: {type: string}
                idempotency_key: {type: string, minLength: 8, maxLength: 128}
                max_attempts: {type: integer, minimum: 1, maximum: 20, default: 3}
      responses:
        '201': {description: Persisted queued discovery job}
        '400': {description: Validation, authorization or idempotency conflict}
        '401': {description: Security administrator token required}
  /api/v1/discovery/jobs/claim:
    post:
      summary: Atomically claim or reclaim the next discovery job
      description: Uses collector certificate identity, an expiring lease and a monotonic fencing token. PostgreSQL uses FOR UPDATE SKIP LOCKED to support concurrent workers without duplicate claims.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, collector_id, certificate_fingerprint, worker_id]
              properties:
                tenant_id: {type: string}
                collector_id: {type: string, format: uuid}
                certificate_fingerprint: {type: string}
                worker_id: {type: string}
                lease_seconds: {type: integer, minimum: 5, maximum: 3600, default: 60}
      responses:
        '200': {description: Claimed job or a null job when the queue is empty}
        '400': {description: Validation or edition gate error}
        '401': {description: Collector certificate identity rejected}
