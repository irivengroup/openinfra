    post:
      summary: Store immutable discovery evidence without mutating RSOT
      description: Stores a tenant-isolated evidence document, rejects secret-bearing payload keys, computes payload hash and completeness, 
        and records an audit event without copying the evidence payload into the audit trail.
      security: [bearerToken: []]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, object_key, object_kind, source, source_ref, scope, external_id, confidence, payload]
              properties:
                tenant_id: {type: string}
                actor: {type: string, default: api}
                evidence_id: {type: string, format: uuid, nullable: true}
                object_key: {type: string}
                object_kind: {type: string}
                source: {type: string, enum: [snmp, ssh, winrm, vmware, proxmox, hyperv, kubernetes, aws, azure, gcp, openstack, cloud, 
                      import, manual]}
                source_ref: {type: string}
                scope: {type: string}
                external_id: {type: string}
                confidence: {type: number, minimum: 0, maximum: 1}
                observed_at: {type: string, format: date-time, nullable: true}
                payload: {type: object, additionalProperties: true}
      responses:
        '201': {description: Immutable discovery evidence stored}
        '400': {description: Validation or secret-material rejection}
        '401': {description: RSOT governance write permission required}
        '409': {description: Evidence identifier already exists with different content}
      tags:
